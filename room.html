<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>わたしの おへや ・ あそびのもり</title>
<meta name="theme-color" content="#caa06a">
<link rel="icon" href="assets/icons/favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fff7ea; --paper2:#ffeccd;
  --ink:#5b4022; --ink-soft:#7c5d39; --ink-faint:#a98c66;
  --honey:#ffb43d; --honey-d:#f59312; --honey-l:#ffdb95;
  /* room のアクセント＝もり の どんぐり茶 */
  --ac:#c0832f; --ac-d:#9a6420; --ac-sh:#7d4f17; --ac-soft:#ffe7c4;
  --r:30px; --r-sm:20px;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;min-height:100%;
  background:linear-gradient(180deg,#ffe9c0 0%,#ffd99a 100%) fixed;}
body{font-family:'M PLUS Rounded 1c',sans-serif;color:var(--ink);
  position:relative;overflow-x:hidden;max-width:600px;margin:0 auto;
  padding:0 14px calc(26px + env(safe-area-inset-bottom));}

/* ===== TOPBAR ===== */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 2px 10px;}
.home{flex:0 0 auto;width:54px;height:54px;border:none;cursor:pointer;padding:0;
  border-radius:18px;background:linear-gradient(180deg,#fffdf7,#ffeccd);
  box-shadow:0 6px 0 rgba(150,100,40,.25),inset 0 2px 0 #fff;
  display:flex;align-items:center;justify-content:center;transition:transform .14s var(--ease);}
.home:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(150,100,40,.25),inset 0 2px 0 #fff;}
.home .ic{width:26px;height:24px;position:relative;}
.home .ic::before{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-bottom:12px solid var(--ac-d);}
.home .ic::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:20px;height:14px;background:var(--ac);border-radius:0 0 4px 4px;}
.title{flex:1;min-width:0;font-family:'Mochiy Pop One';font-size:18px;color:var(--ink);
  text-shadow:0 2px 0 #fff;}
/* どんぐりピル（のこり） */
.purse{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
  background:#fffdf7;padding:8px 15px 8px 11px;border-radius:999px;
  box-shadow:0 5px 0 rgba(150,100,40,.2),inset 0 2px 0 #fff;}
.purse .n{font-family:'Mochiy Pop One';font-size:18px;color:var(--ac-d);}

/* ===== どんぐり アイコン（CSS図形・通貨） ===== */
.acorn{position:relative;display:inline-block;width:22px;height:24px;flex:0 0 auto;}
.acorn .cap{position:absolute;top:0;left:0;width:22px;height:11px;border-radius:11px 11px 4px 4px;
  background:linear-gradient(180deg,#a9712f,#7d4f17);box-shadow:inset 0 2px 0 rgba(255,255,255,.35);}
.acorn .cap::after{content:"";position:absolute;top:-3px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;border-radius:3px;background:#5e3a10;}
.acorn .nut{position:absolute;bottom:0;left:2px;width:18px;height:16px;
  border-radius:9px 9px 9px 9px / 7px 7px 12px 12px;
  background:linear-gradient(180deg,#e6b25a,#cf8b2c);
  box-shadow:inset 0 3px 0 rgba(255,255,255,.4),inset 0 -4px 6px rgba(120,70,15,.3);}

/* ===== おへや ステージ ===== */
.room{position:relative;height:300px;border-radius:26px;overflow:hidden;margin-top:4px;
  background:#ffe6c8 center/cover no-repeat;
  background-image:url('assets/room/room_bg.png');
  box-shadow:0 16px 30px -12px rgba(120,75,20,.45),inset 0 3px 0 rgba(255,255,255,.5),
    inset 0 -10px 18px rgba(150,100,40,.16);}
.furni{position:absolute;touch-action:none;cursor:grab;}
.furni.grab{cursor:grabbing;z-index:9!important;}
.furni img{display:block;width:100%;height:auto;
  filter:drop-shadow(0 5px 4px rgba(110,70,20,.28));}
/* 自分のユニコーン（床中央）。本体は当たり判定なし＝うしろの家具もつかめる */
.stage{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);
  width:168px;z-index:5;pointer-events:none;}
/* ユニコーン＋着せ替えを一緒にふわふわさせるラッパー（影は外＝固定） */
.bob{position:relative;width:100%;animation:bob 3.4s var(--ease) infinite;}
.bob.dragging{animation:none;}   /* ドラッグ中はふわふわを止めてズレ防止 */
.stage .uni{display:block;width:100%;height:auto;
  filter:drop-shadow(0 10px 8px rgba(110,70,20,.32));}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.stage .pad{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
  width:62%;height:16px;border-radius:50%;background:rgba(120,75,20,.2);filter:blur(5px);z-index:-1;}
@media (prefers-reduced-motion: reduce){ .bob{animation:none;} }

/* 着せ替えアクセサリ（ユニコーンに画像で重ねる。.bob の中に入れて一緒に動く） */
.acc{position:absolute;left:50%;transform:translate(-50%,-50%);
  pointer-events:auto;touch-action:none;cursor:grab;}
.acc.grab{cursor:grabbing;}
.acc.acc-back{pointer-events:none;}   /* 後ろレイヤーはつかめない（前レイヤーで操作） */
.acc img{display:block;width:100%;height:auto;
  filter:drop-shadow(0 2px 2px rgba(80,45,10,.22));}
.stage .uni{pointer-events:none;}
/* ほっぺ（画像でなくCSS図形に戻したやつ） */
.blush-css{position:relative;width:100%;padding-top:30%;}
.blush-css .cheek{position:absolute;top:0;width:32%;height:100%;border-radius:50%;
  background:radial-gradient(circle,#ff8fae 0%,rgba(255,143,174,.65) 45%,rgba(255,143,174,0) 72%);}
.blush-css .cheek.l{left:1%;}
.blush-css .cheek.r{right:1%;}

/* ===== くじパネル ===== */
.panel{margin-top:14px;background:#fffdf7;border-radius:24px;padding:16px 16px 18px;
  box-shadow:0 12px 24px -12px rgba(120,75,20,.4),inset 0 3px 0 #fff;text-align:center;}
.panel h2{font-family:'Mochiy Pop One';font-size:17px;color:var(--ink);margin-bottom:4px;}
.panel .sub{font-size:12.5px;font-weight:800;color:var(--ink-soft);margin-bottom:12px;}
.gauge{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.gauge .bar{flex:1;height:14px;border-radius:9px;background:#f0e2c6;overflow:hidden;
  box-shadow:inset 0 2px 3px rgba(150,110,60,.25);}
.gauge .bar i{display:block;height:100%;border-radius:9px;
  background:linear-gradient(90deg,var(--honey-l),var(--ac));transition:width .5s var(--ease);}
.gauge .lab{font-family:'Mochiy Pop One';font-size:13px;color:var(--ink-faint);
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.drawbtn{position:relative;width:100%;border:none;cursor:pointer;
  font-family:'Mochiy Pop One';font-size:19px;color:#fff;padding:16px;border-radius:999px;
  background:linear-gradient(180deg,var(--ac),var(--ac-d));
  box-shadow:0 7px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.4);
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .14s var(--ease),box-shadow .14s var(--ease);}
.drawbtn:active{transform:translateY(4px);box-shadow:0 3px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.4);}
.drawbtn[disabled]{background:linear-gradient(180deg,#d8c6a6,#bda981);box-shadow:0 6px 0 #a08a63;
  color:#fff8ec;cursor:default;}
.drawbtn .price{display:inline-flex;align-items:center;gap:4px;font-size:15px;
  background:rgba(255,255,255,.25);padding:3px 11px;border-radius:999px;}
.drawbtn.ready{animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@media (prefers-reduced-motion: reduce){ .drawbtn.ready{animation:none;} }
.allget{font-family:'Mochiy Pop One';font-size:15px;color:var(--ac-d);
  background:var(--ac-soft);padding:14px;border-radius:999px;}

/* ===== タブ＋ずかん ===== */
.tabs{display:flex;gap:8px;margin:16px 0 12px;}
.tab{flex:1;border:none;cursor:pointer;font-family:'Mochiy Pop One';font-size:14px;
  padding:12px;border-radius:16px;color:var(--ink-soft);background:#ffffffaa;
  box-shadow:inset 0 2px 0 #fff;transition:transform .12s var(--ease);}
.tab[aria-selected="true"]{color:#fff;background:linear-gradient(180deg,var(--ac),var(--ac-d));
  box-shadow:0 5px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.35);}
.tab:active{transform:translateY(2px);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
/* 横画面（タブレット優先）：左におへやステージ、右にくじ＋ずかんの2カラム */
@media (orientation:landscape) and (min-width:720px){
  body{max-width:980px;display:grid;column-gap:30px;row-gap:14px;align-items:start;
    grid-template-columns:minmax(320px,1fr) 1fr;
    grid-template-areas:"top top" "room panel" "room tabs" "room zukan" "room hint";}
  .topbar{grid-area:top;}
  .room{grid-area:room;height:auto;min-height:400px;position:sticky;top:70px;margin-top:0;}
  .panel{grid-area:panel;margin-top:0;}
  .tabs{grid-area:tabs;margin:2px 0 0;}
  #zukan{grid-area:zukan;}
  .hint{grid-area:hint;}
  .grid{grid-template-columns:repeat(4,1fr);}
}
.slot{position:relative;aspect-ratio:1;border-radius:20px;background:#fffdf7;cursor:pointer;
  box-shadow:0 8px 16px -10px rgba(120,75,20,.5),inset 0 2px 0 #fff,inset 0 -7px 12px rgba(190,150,90,.12);
  display:flex;align-items:center;justify-content:center;border:none;padding:0;
  transition:transform .13s var(--ease);overflow:hidden;}
.slot:active{transform:translateY(3px) scale(.97);}
.slot .pv{position:relative;width:78%;height:78%;display:flex;align-items:center;justify-content:center;}
.slot .pv img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;
  filter:drop-shadow(0 3px 3px rgba(110,70,20,.2));}
.slot.locked{cursor:default;background:#f3ead7;}
.slot.locked:active{transform:none;}
.slot.locked .q{font-family:'Mochiy Pop One';font-size:30px;color:#cdb78f;}
.slot.on{background:linear-gradient(180deg,#fff6df,#ffe9c2);
  box-shadow:0 0 0 4px var(--ac),0 8px 16px -8px rgba(120,75,20,.5),inset 0 2px 0 #fff;}
.slot .nm{position:absolute;left:0;right:0;bottom:5px;font-size:10px;font-weight:800;
  color:var(--ink-soft);text-align:center;}
.slot .check{position:absolute;top:5px;right:6px;width:20px;height:20px;border-radius:50%;
  background:var(--ac);box-shadow:0 2px 0 var(--ac-sh);display:none;z-index:2;}
.slot.on .check{display:block;}
.slot .check::after{content:"";position:absolute;left:6px;top:3px;width:5px;height:9px;
  border:solid #fff;border-width:0 3px 3px 0;transform:rotate(42deg);}
.cat-h{font-family:'Mochiy Pop One';font-size:13px;color:var(--ink-soft);
  margin:16px 0 9px 4px;display:flex;align-items:center;gap:7px;}
.cat-h .dot{width:11px;height:11px;border-radius:50%;background:var(--ac);}
.cat-h:first-child{margin-top:2px;}
.hint{text-align:center;font-size:12px;font-weight:800;color:var(--ink-faint);margin-top:14px;}

/* ===== くじ えんしゅつ（オーバーレイ） ===== */
.ovl{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
  background:rgba(60,40,15,.5);backdrop-filter:blur(3px);padding:24px;}
.ovl[hidden]{display:none;}
.prize{background:#fffdf7;border-radius:30px;max-width:330px;width:100%;padding:22px 22px 22px;
  text-align:center;box-shadow:0 26px 50px -16px rgba(90,55,15,.6),inset 0 3px 0 #fff;
  overflow:hidden;}

/* ガチャマシン */
.gacha{position:relative;height:280px;}
.machine{position:absolute;left:50%;top:0;transform:translateX(-50%);width:190px;height:auto;
  filter:drop-shadow(0 10px 10px rgba(110,70,20,.3));transition:opacity .5s var(--ease),transform .5s var(--ease);}
.gacha.rolling .machine{animation:wiggle .35s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:translateX(-50%) rotate(-2.5deg)}50%{transform:translateX(-50%) rotate(2.5deg)}}
.gacha.opened .machine{opacity:.18;transform:translateX(-50%) scale(.86) translateY(-10px);}

/* たまご（マシンの下から出てくる） */
.egg{position:absolute;left:50%;bottom:30px;width:128px;height:128px;transform:translateX(-50%);
  cursor:pointer;opacity:0;}
.egg img{position:absolute;left:0;top:0;width:100%;height:auto;display:block;
  filter:drop-shadow(0 8px 8px rgba(110,70,20,.3));}
.egg .open{opacity:0;transform:scale(.7);transition:opacity .25s,transform .35s var(--spring);}
.gacha.ready .egg{opacity:1;animation:drop .7s var(--spring) 1, eggbob 1.6s var(--ease) .7s infinite;}
@keyframes drop{0%{transform:translateX(-50%) translateY(-150px) scale(.6);opacity:0}
  60%{opacity:1}100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}}
@keyframes eggbob{0%,100%{transform:translateX(-50%) translateY(0) rotate(-5deg)}50%{transform:translateX(-50%) translateY(-6px) rotate(5deg)}}
.gacha.opened .egg{opacity:1;animation:none;transform:translateX(-50%);bottom:54px;cursor:default;}
.gacha.opened .egg .closed{opacity:0;transform:scale(1.15);}
.gacha.opened .egg .open{opacity:1;transform:scale(1.12);}
.egg .closed{transition:opacity .25s,transform .35s var(--ease);}
/* たまごの中身（ごほうび） */
.prizepop{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.4);
  width:78px;height:78px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:none;z-index:3;}
.gacha.opened .prizepop{opacity:1;transform:translate(-50%,-50%) scale(1);
  animation:popin .5s var(--spring);}
.prizepop img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;
  filter:drop-shadow(0 4px 5px rgba(110,70,20,.35));}
@keyframes popin{from{transform:translate(-50%,-50%) scale(.3);opacity:0}to{opacity:1}}

.tap{font-size:12.5px;font-weight:800;color:var(--ink-faint);min-height:18px;transition:opacity .3s;}
.gacha.rolling ~ .tap,.gacha:not(.ready) ~ .tap{opacity:0;}
.gacha.ready ~ .tap{opacity:1;}
.gacha.opened ~ .tap{opacity:0;}
.got{display:none;}
.prize.opened .got{display:block;animation:popin2 .4s var(--spring);}
@keyframes popin2{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}
.prize h2{font-family:'Mochiy Pop One';font-size:21px;color:var(--ink);margin-bottom:4px;}
.prize .pname{font-family:'Mochiy Pop One';font-size:17px;color:var(--ac-d);margin-bottom:16px;}
.prize button{width:100%;border:none;cursor:pointer;font-family:'Mochiy Pop One';font-size:16px;
  color:#fff;padding:14px;border-radius:999px;background:linear-gradient(180deg,var(--honey),var(--honey-d));
  box-shadow:0 5px 0 #d9851f;}
.prize button:active{transform:translateY(2px);box-shadow:0 3px 0 #d9851f;}
@media (prefers-reduced-motion: reduce){
  .gacha.rolling .machine,.gacha.ready .egg{animation:none;}
  .egg{opacity:1;}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="home" id="btnHome" aria-label="おうちへ もどる"><span class="ic"></span></button>
  <div class="title">わたしの おへや</div>
  <div class="purse" aria-label="もっている どんぐり">
    <span class="acorn"><span class="cap"></span><span class="nut"></span></span>
    <span class="n" id="purseN">0</span>
  </div>
</div>

<!-- おへや ステージ -->
<div class="room" id="room">
  <!-- 家具（JSで挿入） -->
  <div class="stage">
    <div class="pad"></div>
    <div class="bob">
      <img class="uni" src="assets/uni/blue_standing.png" alt="わたしの ユニコーン" draggable="false">
      <!-- 着せ替え acc（JSで挿入） -->
    </div>
  </div>
</div>

<!-- くじパネル -->
<div class="panel">
  <h2>どんぐりくじ</h2>
  <div class="sub" id="lotSub">どんぐりを ためて くじを ひこう！</div>
  <div class="gauge">
    <div class="bar"><i id="gaugeFill" style="width:0%"></i></div>
    <span class="lab"><span class="acorn"><span class="cap"></span><span class="nut"></span></span><span id="gaugeLab">0/4</span></span>
  </div>
  <button class="drawbtn" id="btnDraw">
    くじを ひく
    <span class="price"><span class="acorn" style="width:18px;height:20px"><span class="cap"></span><span class="nut"></span></span>4</span>
  </button>
  <div class="allget" id="allGet" hidden>ぜんぶ あつめた！すごい！</div>
</div>

<!-- タブ -->
<div class="tabs" role="tablist">
  <button class="tab" id="tabWear" role="tab" aria-selected="true">きせかえ</button>
  <button class="tab" id="tabRoom" role="tab" aria-selected="false">もよう</button>
</div>
<div id="zukan"></div>
<div class="hint" id="zukanHint"></div>

<!-- くじ えんしゅつ -->
<div class="ovl" id="ovl" hidden>
  <div class="prize" id="prize">
    <div class="gacha" id="gacha">
      <img class="machine" src="assets/gacha/machine.png" alt="" draggable="false">
      <div class="egg" id="egg">
        <img class="closed" src="assets/gacha/egg_closed.png" alt="" draggable="false">
        <img class="open" src="assets/gacha/egg_open.png" alt="" draggable="false">
        <div class="prizepop" id="gotpv"></div>
      </div>
    </div>
    <div class="tap" id="tapHint">タップして あけてね！</div>
    <div class="got">
      <h2>やったね！</h2>
      <div class="pname" id="pname">　</div>
      <button id="prizeOk">うける</button>
    </div>
  </div>
</div>

<script src="assets/audio.js"></script>
<script src="assets/fx.js"></script>
<script src="assets/save.js"></script>
<script src="assets/rewards.js"></script>
<script src="assets/bgm.js"></script>
<script>
'use strict';
function sfx(n){ try{ if(window.Sfx&&Sfx[n]) Sfx[n](); }catch(e){} }
function fx(n){ try{ if(window.FX&&FX[n]) return FX[n].apply(FX, [].slice.call(arguments,1)); }catch(e){} }

/* ====== アイテムの見た目 ======
   原則は画像。ほっぺ(face_blush)だけ画像がいまいちなのでCSS図形で描く。 */
function itemImg(id){ return '<img src="assets/items/'+id+'.png" alt="" draggable="false">'; }
function itemInner(id){
  if(id==='face_blush') return '<div class="blush-css"><div class="cheek l"></div><div class="cheek r"></div></div>';
  return itemImg(id);
}

/* ====== じぶんで おいた いち（ドラッグ位置）を ほぞん ====== */
function roomSave(){ try{ if(window.Save&&Save.game) return Save.game('room'); }catch(e){} return null; }
function loadPos(){ var s=roomSave(); var p=s?s.get('pos',{}):{}; return (p&&typeof p==='object')?p:{}; }
function savePos(id,x,y){ var s=roomSave(); if(!s) return; var p=loadPos(); p[id]={x:x,y:y}; s.set('pos',p); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

/* つかんで うごかせるようにする。
   kind='wear'（ユニコーンの うえ／基準=.bob）／'furni'（へやの なか／基準=#room）。 */
function makeDraggable(el, id, kind, linkEl){
  el.addEventListener('pointerdown', function(ev){
    if(ev.button && ev.button!==0) return;
    ev.preventDefault();
    var base = (kind==='wear') ? bobEl : roomEl;
    if(kind==='wear') bobEl.classList.add('dragging');   // ふわふわ停止＝座標を安定
    el.classList.add('grab');
    try{ el.setPointerCapture(ev.pointerId); }catch(e){}
    sfx('tap');
    var moved=false;
    function move(e){
      var r=base.getBoundingClientRect();
      var x=(e.clientX-r.left)/r.width*100;
      var y=(e.clientY-r.top)/r.height*100;
      if(kind==='wear'){ x=clamp(x,-15,115); y=clamp(y,-25,120); }
      else { x=clamp(x,3,97); y=clamp(y,4,96); }
      el.style.left=x+'%'; el.style.top=y+'%'; el.style.bottom='auto'; el.style.right='auto';
      el.style.transform='translate(-50%,-50%)';
      if(linkEl){ linkEl.style.left=x+'%'; linkEl.style.top=y+'%'; linkEl.style.bottom='auto';
        linkEl.style.right='auto'; linkEl.style.transform='translate(-50%,-50%)'; }
      moved=true;
    }
    function up(e){
      el.removeEventListener('pointermove',move);
      el.removeEventListener('pointerup',up);
      el.removeEventListener('pointercancel',up);
      try{ el.releasePointerCapture(ev.pointerId); }catch(e){}
      el.classList.remove('grab');
      if(kind==='wear') bobEl.classList.remove('dragging');
      if(moved){
        var x=parseFloat(el.style.left), y=parseFloat(el.style.top);
        savePos(id,x,y); sfx('pop');
      }
    }
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
    el.addEventListener('pointercancel',up);
  });
}

/* 着せ替えの重ね位置（ユニコーンのうえ）。
   cx/cy = 画像中心を置く位置（ステージ幅・高さの%）、w = 画像幅（ステージ幅の%）、z = 重ね。 */
var PLACE = {
  hat_party:   {cx:50, cy:-2,  w:46},
  hat_crown:   {cx:50, cy:9,   w:52},
  hat_ribbon:  {cx:50, cy:6,   w:56},
  hat_flower:  {cx:67, cy:13,  w:30},
  hat_knit:    {cx:50, cy:3,   w:58},
  face_glasses:{cx:50, cy:35,  w:62},
  face_heart:  {cx:50, cy:35,  w:64},
  face_star:   {cx:50, cy:35,  w:64},
  face_blush:  {cx:50, cy:43,  w:58},
  /* 首まわりは「巻いてる」立体感のため前後2レイヤー。
     wrap = 前レイヤー（手前）に見せるクリップ。後ろレイヤーは全体を本体の裏(z-1)へ。 */
  neck_scarf:  {cx:50, cy:61,  w:58,  wrap:'inset(40% 0 0 0)'},
  neck_bow:    {cx:50, cy:56,  w:40},
  neck_bell:   {cx:50, cy:60,  w:60,  wrap:'inset(45% 0 0 0)'},
  neck_cape:   {cx:50, cy:60,  w:106, wrap:'inset(0 0 62% 0)'}
};
function placeStyle(id){
  var p = PLACE[id] || {cx:50,cy:30,w:50};
  var c = loadPos()[id];
  var cx = c ? c.x : p.cx, cy = c ? c.y : p.cy;
  return 'left:'+cx+'%;top:'+cy+'%;width:'+p.w+'%;'+
         'transform:translate(-50%,-50%);'+(p.z!=null?'z-index:'+p.z+';':'');
}

/* 家具の配置（部屋のなか）。bottom/top・left/right・width(px)・z を指定。 */
var FURNI = {
  room_rainbow: {w:'140px', z:0, style:'top:5%;left:50%;transform:translateX(-50%);width:140px;z-index:0'},
  room_window:  {w:'78px',  z:0, style:'top:11%;left:7%;width:78px;z-index:0'},
  room_balloon: {w:'50px',  z:1, style:'bottom:36%;right:11%;width:50px;z-index:1'},
  room_rug:     {w:'210px', z:1, style:'bottom:2%;left:50%;transform:translateX(-50%);width:210px;z-index:1'},
  room_books:   {w:'64px',  z:2, style:'bottom:6%;left:3%;width:64px;z-index:2'},
  room_plant:   {w:'54px',  z:3, style:'bottom:6%;left:21%;width:54px;z-index:3'},
  room_lamp:    {w:'56px',  z:3, style:'bottom:6%;right:6%;width:56px;z-index:3'},
  room_teddy:   {w:'60px',  z:4, style:'bottom:5%;right:22%;width:60px;z-index:4'}
};
function furniStyle(id){
  var f = FURNI[id]; if(!f) return '';
  var c = loadPos()[id];
  if(c) return 'left:'+c.x+'%;top:'+c.y+'%;width:'+f.w+';z-index:'+f.z+';transform:translate(-50%,-50%)';
  return f.style;
}

/* ====== 描画 ====== */
var stageEl = document.querySelector('.stage');
var bobEl   = document.querySelector('.bob');
var roomEl  = document.getElementById('room');

function renderUni(){
  [].forEach.call(bobEl.querySelectorAll('.acc'), function(n){ n.remove(); });
  var w = Rewards.wear();
  ['neck','face','hat'].forEach(function(cat){   // 重ね順：くび→かお→あたま
    var id = w[cat];
    if(!id) return;
    var p = PLACE[id] || {};
    if(p.wrap){
      // 後ろレイヤー（本体の裏。輪の後ろ側が隠れる）＝つかめない
      var back = document.createElement('div');
      back.className = 'acc acc-back';
      back.setAttribute('style', placeStyle(id)+'z-index:-1;');
      back.innerHTML = itemImg(id);
      bobEl.appendChild(back);
      // 前レイヤー（胸側だけクリップして手前に）＝こちらをつかむ
      var front = document.createElement('div');
      front.className = 'acc';
      front.setAttribute('style', placeStyle(id)+'z-index:3;');
      front.innerHTML = itemImg(id);
      front.firstChild.style.clipPath = p.wrap;
      front.firstChild.style.webkitClipPath = p.wrap;
      bobEl.appendChild(front);
      makeDraggable(front, id, 'wear', back);
    } else {
      var d = document.createElement('div');
      d.className = 'acc';
      d.setAttribute('style', placeStyle(id));
      d.innerHTML = itemInner(id);
      bobEl.appendChild(d);
      makeDraggable(d, id, 'wear');
    }
  });
}
function renderRoom(){
  [].forEach.call(roomEl.querySelectorAll('.furni'), function(n){ n.remove(); });
  Rewards.byCat('room').forEach(function(it){
    if(!Rewards.isOwned(it.id)) return;
    var f = FURNI[it.id]; if(!f) return;
    var d = document.createElement('div');
    d.className = 'furni'; d.setAttribute('style', furniStyle(it.id));
    d.innerHTML = itemImg(it.id);
    roomEl.insertBefore(d, stageEl);
    makeDraggable(d, it.id, 'furni');
  });
}
function renderPurse(){
  var bal = Rewards.balance();
  document.getElementById('purseN').textContent = bal;
  var P = Rewards.PRICE;
  var toward = Math.min(bal, P);
  document.getElementById('gaugeFill').style.width = Math.round(toward/P*100)+'%';
  document.getElementById('gaugeLab').textContent = bal+'/'+P;

  var btn = document.getElementById('btnDraw');
  var all = document.getElementById('allGet');
  var sub = document.getElementById('lotSub');
  if(Rewards.allCollected()){
    btn.hidden = true; all.hidden = false;
    sub.textContent = 'ごほうびを ぜんぶ あつめたよ！';
  } else if(Rewards.canDraw()){
    btn.hidden = false; all.hidden = true; btn.disabled = false; btn.classList.add('ready');
    sub.textContent = 'くじが ひけるよ！なにが でるかな？';
  } else {
    btn.hidden = false; all.hidden = true; btn.disabled = true; btn.classList.remove('ready');
    var need = P - bal;
    sub.textContent = 'あと '+need+'こ どんぐりを あつめよう！';
  }
}

/* ====== ずかん（タブ） ====== */
var curTab = 'wear';
function miniPreview(id){ return '<div class="pv">'+itemInner(id)+'</div>'; }
function renderZukan(){
  var box = document.getElementById('zukan');
  var hint = document.getElementById('zukanHint');
  box.innerHTML='';
  if(curTab==='wear'){
    [['hat','あたま'],['face','かお'],['neck','くび']].forEach(function(c){
      var h=document.createElement('div'); h.className='cat-h';
      h.innerHTML='<span class="dot"></span>'+c[1];
      box.appendChild(h);
      var g=document.createElement('div'); g.className='grid';
      Rewards.byCat(c[0]).forEach(function(it){ g.appendChild(makeSlot(it,true)); });
      box.appendChild(g);
    });
    hint.textContent='タップで きせかえ。ユニコーンの うえで ゆびで うごかせるよ';
  } else {
    var g=document.createElement('div'); g.className='grid';
    Rewards.byCat('room').forEach(function(it){ g.appendChild(makeSlot(it,false)); });
    box.appendChild(g);
    hint.textContent='かぐを ゆびで うごかして すきに かざろう';
  }
}
function makeSlot(it, wearable){
  var b=document.createElement('button'); b.className='slot';
  var owned = Rewards.isOwned(it.id);
  if(!owned){
    b.className='slot locked';
    b.innerHTML='<span class="q">？</span>';
    b.setAttribute('aria-label','まだ もっていない');
    return b;
  }
  var on = wearable && Rewards.isWearing(it.id);
  if(on) b.classList.add('on');
  b.innerHTML = miniPreview(it.id) +
    '<span class="check"></span><span class="nm">'+it.name+'</span>';
  b.setAttribute('aria-label', it.name + (on?'（きている）':''));
  if(wearable){
    b.addEventListener('click', function(){
      sfx('tap');
      if(Rewards.isWearing(it.id)) Rewards.setWear(it.cat, null);
      else Rewards.setWear(it.cat, it.id);
      sfx('pop');
      renderUni(); renderZukan();
    });
  }
  return b;
}

document.getElementById('tabWear').addEventListener('click', function(){ selTab('wear'); });
document.getElementById('tabRoom').addEventListener('click', function(){ selTab('room'); });
function selTab(t){
  if(curTab===t) return; sfx('tap'); curTab=t;
  document.getElementById('tabWear').setAttribute('aria-selected', t==='wear');
  document.getElementById('tabRoom').setAttribute('aria-selected', t==='room');
  renderZukan();
}

/* ====== くじ（ガチャ演出） ====== */
var pendingPrize = null;
var rollTimer = null;
var gachaEl = document.getElementById('gacha');
var reduce = false;
try{ reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

document.getElementById('btnDraw').addEventListener('click', function(){
  if(!Rewards.canDraw()) return;
  var item = Rewards.draw();
  if(!item) return;
  pendingPrize = item;
  // たまごの中身を仕込む
  document.getElementById('gotpv').innerHTML = itemInner(item.id);
  document.getElementById('pname').textContent = item.name + ' を ゲット！';
  document.getElementById('prize').classList.remove('opened');
  // マシンを回す → たまごが出る
  gachaEl.className = 'gacha';
  document.getElementById('ovl').hidden = false;
  sfx('whoosh');
  if(rollTimer) clearTimeout(rollTimer);
  if(reduce){ gachaEl.classList.add('ready'); sfx('pop'); return; }
  gachaEl.classList.add('rolling');
  // ガラガラ音
  var tk=0; var tick=setInterval(function(){ sfx('tap'); if(++tk>=4) clearInterval(tick); }, 200);
  rollTimer = setTimeout(function(){
    gachaEl.classList.remove('rolling');
    gachaEl.classList.add('ready');
    sfx('pop');
  }, 950);
});
document.getElementById('egg').addEventListener('click', openEgg);
function openEgg(){
  if(!gachaEl.classList.contains('ready')) return;   // 出てくる前は無視
  var item = pendingPrize; if(!item) return;
  gachaEl.classList.remove('ready');
  gachaEl.classList.add('opened');
  document.getElementById('prize').classList.add('opened');
  sfx('fanfare');
  try{
    var r = document.getElementById('egg').getBoundingClientRect();
    fx('burst', r.left+r.width/2, r.top+r.height/2, {count:28});
    fx('confetti');
  }catch(e){}
}
document.getElementById('prizeOk').addEventListener('click', function(){
  sfx('ding');
  document.getElementById('ovl').hidden = true;
  pendingPrize = null;
  renderUni(); renderRoom(); renderPurse(); renderZukan();
});
document.getElementById('ovl').addEventListener('click', function(e){
  if(e.target===this){
    if(gachaEl.classList.contains('ready')) openEgg();
  }
});

/* ====== もどる ====== */
document.getElementById('btnHome').addEventListener('click', function(){
  sfx('tap');
  setTimeout(function(){ location.href='index.html'; }, 100);
});

/* ====== 初期化 ====== */
renderRoom(); renderUni(); renderPurse(); renderZukan();
</script>
<script>try{ Bgm.play('room'); }catch(e){}</script>
