<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>わたしの おへや ・ あそびのもり</title>
<meta name="theme-color" content="#caa06a">
<link rel="icon" href="assets/icons/favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fff7ea; --paper2:#ffeccd;
  --ink:#5b4022; --ink-soft:#7c5d39; --ink-faint:#a98c66;
  --honey:#ffb43d; --honey-d:#f59312; --honey-l:#ffdb95;
  /* room のアクセント＝もり の どんぐり茶 */
  --ac:#c0832f; --ac-d:#9a6420; --ac-sh:#7d4f17; --ac-soft:#ffe7c4;
  --r:30px; --r-sm:20px;
  --ease:cubic-bezier(.22,1,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;min-height:100%;
  background:linear-gradient(180deg,#ffe9c0 0%,#ffd99a 100%) fixed;}
body{font-family:'M PLUS Rounded 1c',sans-serif;color:var(--ink);
  position:relative;overflow-x:hidden;max-width:600px;margin:0 auto;
  padding:0 14px calc(26px + env(safe-area-inset-bottom));}

/* ===== TOPBAR ===== */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 2px 10px;}
.home{flex:0 0 auto;width:54px;height:54px;border:none;cursor:pointer;padding:0;
  border-radius:18px;background:linear-gradient(180deg,#fffdf7,#ffeccd);
  box-shadow:0 6px 0 rgba(150,100,40,.25),inset 0 2px 0 #fff;
  display:flex;align-items:center;justify-content:center;transition:transform .14s var(--ease);}
.home:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(150,100,40,.25),inset 0 2px 0 #fff;}
.home .ic{width:26px;height:24px;position:relative;}
.home .ic::before{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-bottom:12px solid var(--ac-d);}
.home .ic::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:20px;height:14px;background:var(--ac);border-radius:0 0 4px 4px;}
.title{flex:1;min-width:0;font-family:'Mochiy Pop One';font-size:18px;color:var(--ink);
  text-shadow:0 2px 0 #fff;}
/* どんぐりピル（のこり） */
.purse{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
  background:#fffdf7;padding:8px 15px 8px 11px;border-radius:999px;
  box-shadow:0 5px 0 rgba(150,100,40,.2),inset 0 2px 0 #fff;}
.purse .n{font-family:'Mochiy Pop One';font-size:18px;color:var(--ac-d);}

/* ===== どんぐり アイコン（CSS図形） ===== */
.acorn{position:relative;display:inline-block;width:22px;height:24px;flex:0 0 auto;}
.acorn .cap{position:absolute;top:0;left:0;width:22px;height:11px;border-radius:11px 11px 4px 4px;
  background:linear-gradient(180deg,#a9712f,#7d4f17);box-shadow:inset 0 2px 0 rgba(255,255,255,.35);}
.acorn .cap::after{content:"";position:absolute;top:-3px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;border-radius:3px;background:#5e3a10;}
.acorn .nut{position:absolute;bottom:0;left:2px;width:18px;height:16px;
  border-radius:9px 9px 9px 9px / 7px 7px 12px 12px;
  background:linear-gradient(180deg,#e6b25a,#cf8b2c);
  box-shadow:inset 0 3px 0 rgba(255,255,255,.4),inset 0 -4px 6px rgba(120,70,15,.3);}

/* ===== おへや ステージ ===== */
.room{position:relative;height:300px;border-radius:26px;overflow:hidden;margin-top:4px;
  background:linear-gradient(180deg,#ffe6c8 0%,#ffe6c8 56%,#f6c98f 56%,#eabb7a 100%);
  box-shadow:0 16px 30px -12px rgba(120,75,20,.45),inset 0 3px 0 rgba(255,255,255,.7),
    inset 0 -10px 18px rgba(150,100,40,.16);}
/* かべの巾木 */
.room::after{content:"";position:absolute;left:0;right:0;top:56%;height:6px;
  background:rgba(150,100,40,.18);}
.furni{position:absolute;}
/* 自分のユニコーン（床中央） */
.stage{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);
  width:172px;z-index:5;}
.stage .uni{display:block;width:100%;height:auto;
  filter:drop-shadow(0 10px 8px rgba(110,70,20,.32));
  animation:bob 3.4s var(--ease) infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.stage .pad{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
  width:62%;height:16px;border-radius:50%;background:rgba(120,75,20,.2);filter:blur(5px);z-index:-1;}
@media (prefers-reduced-motion: reduce){ .stage .uni{animation:none;} }

/* 着せ替えアクセサリ（ユニコーンに重ねる） */
.acc{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;}

/* === あたま === */
.hat-party{top:-13%;width:46%;}
.hat-party .cone{width:100%;padding-top:96%;position:relative;
  background:linear-gradient(135deg,#ff8aa6,#ec4d75);
  clip-path:polygon(50% 0,100% 100%,0 100%);
  filter:drop-shadow(0 3px 2px rgba(120,30,50,.3));}
.hat-party .cone::before{content:"";position:absolute;left:14%;right:14%;bottom:8%;height:18%;
  background:repeating-linear-gradient(45deg,#fff5,#fff5 5px,transparent 5px,transparent 11px);}
.hat-party .pom{position:absolute;top:-12%;left:50%;transform:translateX(-50%);
  width:26%;padding-top:26%;border-radius:50%;background:#fff;
  box-shadow:inset 0 2px 0 #fff,0 2px 2px rgba(0,0,0,.15);}
.hat-crown{top:-5%;width:50%;}
.hat-crown .band{width:100%;padding-top:62%;position:relative;
  background:linear-gradient(180deg,#ffd34d,#f0a81f);
  clip-path:polygon(0 38%,16% 38%,25% 0,37% 38%,50% 6%,63% 38%,75% 0,84% 38%,100% 38%,100% 100%,0 100%);
  filter:drop-shadow(0 3px 2px rgba(140,90,10,.35));}
.hat-crown .band::after{content:"";position:absolute;left:50%;top:60%;transform:translateX(-50%);
  width:16%;padding-top:16%;border-radius:50%;background:#ff5d7a;box-shadow:inset 0 2px 0 #fff8;}
.hat-ribbon{top:-2%;left:74%;width:34%;}
.hat-ribbon .b{width:100%;padding-top:64%;position:relative;}
.hat-ribbon .b::before,.hat-ribbon .b::after{content:"";position:absolute;top:0;width:48%;height:100%;
  background:linear-gradient(180deg,#ff9ec4,#f06ba0);}
.hat-ribbon .b::before{left:0;clip-path:polygon(100% 0,100% 100%,0 78%,0 22%);border-radius:8px 0 0 8px;}
.hat-ribbon .b::after{right:0;clip-path:polygon(0 0,0 100%,100% 78%,100% 22%);border-radius:0 8px 8px 0;}
.hat-ribbon .knot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:24%;padding-top:24%;border-radius:50%;background:#e85a93;z-index:2;box-shadow:inset 0 2px 0 #fff7;}
.hat-flower{top:-3%;left:73%;width:30%;}
.hat-flower .f{width:100%;padding-top:100%;position:relative;}
.hat-flower .petal{position:absolute;left:50%;top:50%;width:46%;height:46%;border-radius:50%;
  background:linear-gradient(180deg,#fff0a6,#ffd24d);margin:-23% 0 0 -23%;}
.hat-flower .core{position:absolute;left:50%;top:50%;width:34%;height:34%;border-radius:50%;
  background:#ff9d2e;transform:translate(-50%,-50%);z-index:2;box-shadow:inset 0 2px 0 #fff8;}
.hat-knit{top:-10%;width:54%;}
.hat-knit .k{width:100%;padding-top:58%;position:relative;
  background:linear-gradient(180deg,#7fd0e8,#3fa9cc);border-radius:50% 50% 16px 16px;
  filter:drop-shadow(0 3px 2px rgba(20,90,120,.3));}
.hat-knit .k::after{content:"";position:absolute;left:0;right:0;bottom:0;height:26%;
  background:#bfeaf6;border-radius:0 0 14px 14px;box-shadow:inset 0 3px 0 #fff8;}
.hat-knit .pom{position:absolute;top:-16%;left:50%;transform:translateX(-50%);
  width:26%;padding-top:26%;border-radius:50%;background:#fff;box-shadow:0 2px 2px rgba(0,0,0,.12);}

/* === かお === */
.face-glasses{top:39%;width:64%;}
.face-glasses .g{width:100%;padding-top:34%;position:relative;}
.face-glasses .lens{position:absolute;top:0;width:40%;height:100%;border-radius:50%;
  border:4px solid #4a3a2a;background:rgba(255,255,255,.22);box-sizing:border-box;}
.face-glasses .lens.l{left:0;}.face-glasses .lens.r{right:0;}
.face-glasses .br{position:absolute;left:40%;right:40%;top:42%;height:4px;background:#4a3a2a;border-radius:2px;}
.face-heart{top:38%;width:66%;}
.face-heart .g{width:100%;padding-top:36%;position:relative;}
.face-heart .lens{position:absolute;top:0;width:42%;height:100%;}
.face-heart .lens::before{content:"";position:absolute;inset:0;background:#ff7a9c;
  clip-path:polygon(50% 100%,8% 45%,8% 22%,28% 8%,50% 24%,72% 8%,92% 22%,92% 45%);
  box-shadow:inset 0 2px 0 #fff7;}
.face-heart .lens.l{left:0;}.face-heart .lens.r{right:0;}
.face-heart .br{position:absolute;left:42%;right:42%;top:30%;height:4px;background:#e8567a;border-radius:2px;}
.face-star{top:38%;width:66%;}
.face-star .g{width:100%;padding-top:36%;position:relative;}
.face-star .lens{position:absolute;top:0;width:42%;height:100%;}
.face-star .lens::before{content:"";position:absolute;inset:0;background:#ffcf3e;
  clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  box-shadow:inset 0 2px 0 #fff8;}
.face-star .lens.l{left:0;}.face-star .lens.r{right:0;}
.face-star .br{position:absolute;left:42%;right:42%;top:30%;height:4px;background:#e0a91f;border-radius:2px;}
.face-blush{top:46%;width:78%;}
.face-blush .b{width:100%;padding-top:22%;position:relative;}
.face-blush .c{position:absolute;top:0;width:24%;height:100%;border-radius:50%;
  background:radial-gradient(circle,#ff9bb3,rgba(255,155,179,0) 70%);}
.face-blush .c.l{left:2%;}.face-blush .c.r{right:2%;}

/* === くび === */
.neck-scarf{top:55%;width:72%;}
.neck-scarf .s{width:100%;padding-top:30%;position:relative;}
.neck-scarf .band{position:absolute;left:0;right:0;top:0;height:64%;border-radius:14px;
  background:linear-gradient(180deg,#ff8f6b,#ee5a3c);box-shadow:inset 0 3px 0 #fff5;}
.neck-scarf .tail{position:absolute;left:30%;top:46%;width:22%;height:80%;border-radius:8px;
  background:linear-gradient(180deg,#f86b48,#d6411f);}
.neck-scarf .tail::after{content:"";position:absolute;left:0;right:0;bottom:0;height:5px;background:#fff6;}
.neck-bow{top:54%;width:42%;}
.neck-bow .b{width:100%;padding-top:50%;position:relative;}
.neck-bow .b::before,.neck-bow .b::after{content:"";position:absolute;top:8%;width:46%;height:84%;
  background:linear-gradient(180deg,#8f7bf0,#6c54d6);}
.neck-bow .b::before{left:0;clip-path:polygon(0 0,100% 26%,100% 74%,0 100%);border-radius:8px;}
.neck-bow .b::after{right:0;clip-path:polygon(100% 0,0 26%,0 74%,100% 100%);border-radius:8px;}
.neck-bow .k{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:18%;padding-top:30%;border-radius:5px;background:#5a40c0;z-index:2;}
.neck-bell{top:55%;width:70%;}
.neck-bell .s{width:100%;padding-top:26%;position:relative;}
.neck-bell .band{position:absolute;left:0;right:0;top:0;height:40%;border-radius:10px;
  background:linear-gradient(180deg,#ff9ec4,#ec5f97);box-shadow:inset 0 2px 0 #fff6;}
.neck-bell .bell{position:absolute;left:50%;top:24%;transform:translateX(-50%);
  width:22%;padding-top:22%;border-radius:50%;background:linear-gradient(180deg,#ffe06a,#e0a91f);
  box-shadow:inset 0 2px 0 #fff8;z-index:2;}
.neck-cape{top:50%;width:104%;z-index:-1;}
.neck-cape .c{width:100%;padding-top:52%;position:relative;
  background:linear-gradient(180deg,#7ad08f,#3d9e5d);
  clip-path:polygon(50% 0,90% 10%,100% 100%,0 100%,10% 10%);
  border-radius:0 0 24px 24px;filter:drop-shadow(0 4px 3px rgba(20,90,40,.3));}
.neck-cape .c::after{content:"";position:absolute;left:0;right:0;top:0;height:18%;background:#bfe9c9;}

/* ===== くじパネル ===== */
.panel{margin-top:14px;background:#fffdf7;border-radius:24px;padding:16px 16px 18px;
  box-shadow:0 12px 24px -12px rgba(120,75,20,.4),inset 0 3px 0 #fff;text-align:center;}
.panel h2{font-family:'Mochiy Pop One';font-size:17px;color:var(--ink);margin-bottom:4px;}
.panel .sub{font-size:12.5px;font-weight:800;color:var(--ink-soft);margin-bottom:12px;}
.gauge{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.gauge .bar{flex:1;height:14px;border-radius:9px;background:#f0e2c6;overflow:hidden;
  box-shadow:inset 0 2px 3px rgba(150,110,60,.25);}
.gauge .bar i{display:block;height:100%;border-radius:9px;
  background:linear-gradient(90deg,var(--honey-l),var(--ac));transition:width .5s var(--ease);}
.gauge .lab{font-family:'Mochiy Pop One';font-size:13px;color:var(--ink-faint);
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.drawbtn{position:relative;width:100%;border:none;cursor:pointer;
  font-family:'Mochiy Pop One';font-size:19px;color:#fff;padding:16px;border-radius:999px;
  background:linear-gradient(180deg,var(--ac),var(--ac-d));
  box-shadow:0 7px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.4);
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .14s var(--ease),box-shadow .14s var(--ease);}
.drawbtn:active{transform:translateY(4px);box-shadow:0 3px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.4);}
.drawbtn[disabled]{background:linear-gradient(180deg,#d8c6a6,#bda981);box-shadow:0 6px 0 #a08a63;
  color:#fff8ec;cursor:default;}
.drawbtn .price{display:inline-flex;align-items:center;gap:4px;font-size:15px;
  background:rgba(255,255,255,.25);padding:3px 11px;border-radius:999px;}
.drawbtn.ready{animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@media (prefers-reduced-motion: reduce){ .drawbtn.ready{animation:none;} }
.allget{font-family:'Mochiy Pop One';font-size:15px;color:var(--ac-d);
  background:var(--ac-soft);padding:14px;border-radius:999px;}

/* ===== タブ＋ずかん ===== */
.tabs{display:flex;gap:8px;margin:16px 0 12px;}
.tab{flex:1;border:none;cursor:pointer;font-family:'Mochiy Pop One';font-size:14px;
  padding:12px;border-radius:16px;color:var(--ink-soft);background:#ffffffaa;
  box-shadow:inset 0 2px 0 #fff;transition:transform .12s var(--ease);}
.tab[aria-selected="true"]{color:#fff;background:linear-gradient(180deg,var(--ac),var(--ac-d));
  box-shadow:0 5px 0 var(--ac-sh),inset 0 2px 0 rgba(255,255,255,.35);}
.tab:active{transform:translateY(2px);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.slot{position:relative;aspect-ratio:1;border-radius:20px;background:#fffdf7;cursor:pointer;
  box-shadow:0 8px 16px -10px rgba(120,75,20,.5),inset 0 2px 0 #fff,inset 0 -7px 12px rgba(190,150,90,.12);
  display:flex;align-items:center;justify-content:center;border:none;padding:0;
  transition:transform .13s var(--ease);overflow:hidden;}
.slot:active{transform:translateY(3px) scale(.97);}
.slot .pv{position:relative;width:62%;height:62%;}        /* プレビュー枠 */
.slot.locked{cursor:default;background:#f3ead7;}
.slot.locked:active{transform:none;}
.slot.locked .q{font-family:'Mochiy Pop One';font-size:30px;color:#cdb78f;}
.slot.on{background:linear-gradient(180deg,#fff6df,#ffe9c2);
  box-shadow:0 0 0 4px var(--ac),0 8px 16px -8px rgba(120,75,20,.5),inset 0 2px 0 #fff;}
.slot .nm{position:absolute;left:0;right:0;bottom:5px;font-size:10px;font-weight:800;
  color:var(--ink-soft);text-align:center;}
.slot .check{position:absolute;top:5px;right:6px;width:20px;height:20px;border-radius:50%;
  background:var(--ac);box-shadow:0 2px 0 var(--ac-sh);display:none;}
.slot.on .check{display:block;}
.slot .check::after{content:"";position:absolute;left:6px;top:3px;width:5px;height:9px;
  border:solid #fff;border-width:0 3px 3px 0;transform:rotate(42deg);}
.cat-h{font-family:'Mochiy Pop One';font-size:13px;color:var(--ink-soft);
  margin:16px 0 9px 4px;display:flex;align-items:center;gap:7px;}
.cat-h .dot{width:11px;height:11px;border-radius:50%;background:var(--ac);}
.cat-h:first-child{margin-top:2px;}
.hint{text-align:center;font-size:12px;font-weight:800;color:var(--ink-faint);margin-top:14px;}

/* プレビュー（ずかん内）— acc をそのまま縮小して中央に置く */
.pv .acc{left:50%;top:50%!important;transform:translate(-50%,-50%)!important;width:88%!important;}
.pv .acc.hat-ribbon,.pv .acc.hat-flower{left:50%;}

/* ===== くじ えんしゅつ（オーバーレイ） ===== */
.ovl{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
  background:rgba(60,40,15,.5);backdrop-filter:blur(3px);padding:24px;}
.ovl[hidden]{display:none;}
.prize{background:#fffdf7;border-radius:30px;max-width:330px;width:100%;padding:26px 22px 22px;
  text-align:center;box-shadow:0 26px 50px -16px rgba(90,55,15,.6),inset 0 3px 0 #fff;}
.prize .egg{width:120px;height:138px;margin:4px auto 6px;position:relative;cursor:pointer;}
/* おおきな どんぐり（たまご役） */
.bigacorn{width:100%;height:100%;position:relative;animation:wob .6s ease-in-out infinite;}
@keyframes wob{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.bigacorn .cap{position:absolute;top:0;left:6%;width:88%;height:42%;border-radius:60px 60px 14px 14px;
  background:linear-gradient(180deg,#a9712f,#7d4f17);box-shadow:inset 0 4px 0 rgba(255,255,255,.3);}
.bigacorn .cap::after{content:"";position:absolute;top:-10%;left:50%;transform:translateX(-50%);
  width:12px;height:16px;border-radius:6px;background:#5e3a10;}
.bigacorn .nut{position:absolute;bottom:0;left:12%;width:76%;height:66%;
  border-radius:38px 38px 38px 38px / 26px 26px 50px 50px;
  background:linear-gradient(180deg,#e6b25a,#cf8b2c);
  box-shadow:inset 0 5px 0 rgba(255,255,255,.4),inset 0 -7px 10px rgba(120,70,15,.3);}
.prize .tap{font-size:12.5px;font-weight:800;color:var(--ink-faint);}
.prize .got{display:none;}
.prize.opened .egg,.prize.opened .tap{display:none;}
.prize.opened .got{display:block;animation:popin .4s var(--spring);}
@keyframes popin{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}
.prize .gotpv{width:120px;height:120px;margin:0 auto 10px;position:relative;
  background:radial-gradient(circle at 50% 38%,#fff6df,#ffe6bf);border-radius:50%;
  box-shadow:inset 0 3px 0 #fff,0 8px 16px -8px rgba(120,75,20,.5);}
.prize .gotpv .acc{left:50%!important;top:50%!important;transform:translate(-50%,-50%)!important;width:74%!important;}
.prize h2{font-family:'Mochiy Pop One';font-size:21px;color:var(--ink);margin-bottom:4px;}
.prize .pname{font-family:'Mochiy Pop One';font-size:17px;color:var(--ac-d);margin-bottom:16px;}
.prize button{width:100%;border:none;cursor:pointer;font-family:'Mochiy Pop One';font-size:16px;
  color:#fff;padding:14px;border-radius:999px;background:linear-gradient(180deg,var(--honey),var(--honey-d));
  box-shadow:0 5px 0 #d9851f;}
.prize button:active{transform:translateY(2px);box-shadow:0 3px 0 #d9851f;}
</style>
</head>
<body>

<div class="topbar">
  <button class="home" id="btnHome" aria-label="おうちへ もどる"><span class="ic"></span></button>
  <div class="title">わたしの おへや</div>
  <div class="purse" aria-label="もっている どんぐり">
    <span class="acorn"><span class="cap"></span><span class="nut"></span></span>
    <span class="n" id="purseN">0</span>
  </div>
</div>

<!-- おへや ステージ -->
<div class="room" id="room">
  <!-- 家具（JSで挿入） -->
  <div class="stage">
    <div class="pad"></div>
    <img class="uni" src="assets/uni/blue_standing.png" alt="わたしの ユニコーン" draggable="false">
    <!-- 着せ替え acc（JSで挿入） -->
  </div>
</div>

<!-- くじパネル -->
<div class="panel">
  <h2>どんぐりくじ</h2>
  <div class="sub" id="lotSub">どんぐりを ためて くじを ひこう！</div>
  <div class="gauge">
    <div class="bar"><i id="gaugeFill" style="width:0%"></i></div>
    <span class="lab"><span class="acorn"><span class="cap"></span><span class="nut"></span></span><span id="gaugeLab">0/4</span></span>
  </div>
  <button class="drawbtn" id="btnDraw">
    くじを ひく
    <span class="price"><span class="acorn" style="width:18px;height:20px"><span class="cap"></span><span class="nut"></span></span>4</span>
  </button>
  <div class="allget" id="allGet" hidden>ぜんぶ あつめた！すごい！</div>
</div>

<!-- タブ -->
<div class="tabs" role="tablist">
  <button class="tab" id="tabWear" role="tab" aria-selected="true">きせかえ</button>
  <button class="tab" id="tabRoom" role="tab" aria-selected="false">もよう</button>
</div>
<div id="zukan"></div>
<div class="hint" id="zukanHint"></div>

<!-- くじ えんしゅつ -->
<div class="ovl" id="ovl" hidden>
  <div class="prize" id="prize">
    <div class="egg" id="egg"><div class="bigacorn"><span class="cap"></span><span class="nut"></span></div></div>
    <div class="tap">タップして あけてね！</div>
    <div class="got">
      <div class="gotpv" id="gotpv"></div>
      <h2>やったね！</h2>
      <div class="pname" id="pname">　</div>
      <button id="prizeOk">うける</button>
    </div>
  </div>
</div>

<script src="assets/audio.js"></script>
<script src="assets/fx.js"></script>
<script src="assets/save.js"></script>
<script src="assets/rewards.js"></script>
<script src="assets/bgm.js"></script>
<script>
'use strict';
function sfx(n){ try{ if(window.Sfx&&Sfx[n]) Sfx[n](); }catch(e){} }
function fx(n){ try{ if(window.FX&&FX[n]) return FX[n].apply(FX, [].slice.call(arguments,1)); }catch(e){} }

/* ====== アクセサリ／家具の見た目（CSS図形）======
   返すのは .acc 要素の中身（HTML）。配置は CSS クラスで持つ。 */
function accInner(id){
  switch(id){
    case 'hat_party':  return '<div class="cone"></div><div class="pom"></div>';
    case 'hat_crown':  return '<div class="band"></div>';
    case 'hat_ribbon': return '<div class="b"></div><div class="knot"></div>';
    case 'hat_flower': return '<div class="f">'+
        '<div class="petal" style="transform:rotate(0deg) translateY(-58%)"></div>'+
        '<div class="petal" style="transform:rotate(72deg) translateY(-58%)"></div>'+
        '<div class="petal" style="transform:rotate(144deg) translateY(-58%)"></div>'+
        '<div class="petal" style="transform:rotate(216deg) translateY(-58%)"></div>'+
        '<div class="petal" style="transform:rotate(288deg) translateY(-58%)"></div>'+
        '<div class="core"></div></div>';
    case 'hat_knit':   return '<div class="k"></div><div class="pom"></div>';
    case 'face_glasses':return '<div class="g"><div class="lens l"></div><div class="lens r"></div><div class="br"></div></div>';
    case 'face_heart': return '<div class="g"><div class="lens l"></div><div class="lens r"></div><div class="br"></div></div>';
    case 'face_star':  return '<div class="g"><div class="lens l"></div><div class="lens r"></div><div class="br"></div></div>';
    case 'face_blush': return '<div class="b"><div class="c l"></div><div class="c r"></div></div>';
    case 'neck_scarf': return '<div class="s"><div class="band"></div><div class="tail"></div></div>';
    case 'neck_bow':   return '<div class="b"></div><div class="k"></div>';
    case 'neck_bell':  return '<div class="s"><div class="band"></div><div class="bell"></div></div>';
    case 'neck_cape':  return '<div class="c"></div>';
  }
  return '';
}
/* class 名（acc + 形クラス）。形クラスは id のアンダースコアをハイフンに。 */
function accClass(id){ return 'acc '+id.replace('_','-'); }

/* 家具の見た目。返すのは .furni 要素まるごと（位置 inline）。 */
var FURNI = {
  room_window:  {style:'top:8%;left:9%;width:74px;height:60px;z-index:0',
    html:'<div style="width:100%;height:100%;background:linear-gradient(180deg,#bfe6ff,#88c8f0);border:6px solid #fff;border-radius:10px;box-shadow:0 4px 0 rgba(150,100,40,.2),inset 0 2px 6px rgba(0,0,0,.08)"><div style="position:absolute;left:50%;top:6px;bottom:6px;width:4px;background:#fff;transform:translateX(-50%)"></div><div style="position:absolute;top:50%;left:6px;right:6px;height:4px;background:#fff;transform:translateY(-50%)"></div></div>'},
  room_rainbow: {style:'top:5%;left:50%;transform:translateX(-50%);width:120px;height:60px;z-index:0',
    html:'<div style="width:100%;height:200%;border-radius:50% 50% 0 0;border:7px solid #ff8a8a;border-bottom:none;box-sizing:border-box"></div>'+
         '<div style="position:absolute;top:7px;left:7px;right:7px;height:200%;border-radius:50% 50% 0 0;border:7px solid #ffd36b;border-bottom:none;box-sizing:border-box"></div>'+
         '<div style="position:absolute;top:14px;left:14px;right:14px;height:200%;border-radius:50% 50% 0 0;border:7px solid #7fd09a;border-bottom:none;box-sizing:border-box"></div>'},
  room_rug:     {style:'bottom:3%;left:50%;transform:translateX(-50%);width:200px;height:40px;z-index:1',
    html:'<div style="width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,#ffc9d6,#f59ab0);box-shadow:inset 0 3px 0 #fff6,0 4px 8px -4px rgba(120,75,20,.4)"></div>'},
  room_books:   {style:'bottom:8%;left:3%;width:52px;height:64px;z-index:2',
    html:'<div style="position:absolute;bottom:0;width:100%;height:84%;background:#caa06a;border-radius:6px;box-shadow:inset 0 3px 0 #fff5"></div>'+
         '<div style="position:absolute;bottom:30%;left:6px;width:9px;height:46%;background:#ef6b6b;border-radius:2px"></div>'+
         '<div style="position:absolute;bottom:30%;left:17px;width:9px;height:54%;background:#5fa9e8;border-radius:2px"></div>'+
         '<div style="position:absolute;bottom:30%;left:28px;width:9px;height:40%;background:#7fcf8f;border-radius:2px"></div>'+
         '<div style="position:absolute;bottom:30%;left:39px;width:8px;height:50%;background:#ffcf3e;border-radius:2px"></div>'},
  room_plant:   {style:'bottom:7%;left:8%;width:46px;height:64px;z-index:3',
    html:'<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:34px;height:30px;background:linear-gradient(180deg,#d98a4e,#b56a30);border-radius:6px 6px 10px 10px;box-shadow:inset 0 2px 0 #fff5"></div>'+
         '<div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:18px;height:38px;background:#5fb878;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%"></div>'+
         '<div style="position:absolute;bottom:30px;left:32%;width:16px;height:26px;background:#6fc888;border-radius:50%;transform:rotate(-30deg)"></div>'+
         '<div style="position:absolute;bottom:30px;right:32%;width:16px;height:26px;background:#6fc888;border-radius:50%;transform:rotate(30deg)"></div>'},
  room_lamp:    {style:'bottom:8%;right:8%;width:46px;height:80px;z-index:3',
    html:'<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:8px;background:#9a6420;border-radius:5px"></div>'+
         '<div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:6px;height:48px;background:#b58450"></div>'+
         '<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:42px;height:30px;background:linear-gradient(180deg,#ffe9a8,#ffd24d);border-radius:8px 8px 16px 16px;box-shadow:0 0 16px 4px rgba(255,210,90,.5),inset 0 3px 0 #fff7"></div>'},
  room_teddy:   {style:'bottom:7%;right:24%;width:50px;height:60px;z-index:4',
    html:'<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:34px;height:32px;background:#caa06a;border-radius:50%;box-shadow:inset 0 3px 0 #fff5"></div>'+
         '<div style="position:absolute;top:-3px;left:6px;width:14px;height:14px;background:#b88a52;border-radius:50%"></div>'+
         '<div style="position:absolute;top:-3px;right:6px;width:14px;height:14px;background:#b88a52;border-radius:50%"></div>'+
         '<div style="position:absolute;top:9px;left:50%;transform:translateX(-50%);width:8px;height:6px;background:#5b4022;border-radius:50%"></div>'+
         '<div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:38px;height:32px;background:#bd9460;border-radius:16px;box-shadow:inset 0 3px 0 #fff5"></div>'},
  room_balloon: {style:'top:6%;right:14%;width:44px;height:120px;z-index:2',
    html:'<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:50px;background:radial-gradient(circle at 38% 32%,#ff9aa9,#ee5d72);border-radius:50% 50% 50% 50% / 46% 46% 54% 54%;box-shadow:inset 0 4px 0 #fff7"></div>'+
         '<div style="position:absolute;top:48px;left:50%;width:2px;height:70px;background:rgba(120,75,20,.4)"></div>'}
};

/* ====== 描画 ====== */
var stageEl = document.querySelector('.stage');
var roomEl  = document.getElementById('room');

function renderUni(){
  // 既存 acc を消す
  [].forEach.call(stageEl.querySelectorAll('.acc'), function(n){ n.remove(); });
  var w = Rewards.wear();
  ['neck','face','hat'].forEach(function(cat){   // 重ね順：くび→かお→あたま
    var id = w[cat];
    if(!id) return;
    var d = document.createElement('div');
    d.className = accClass(id);
    d.innerHTML = accInner(id);
    stageEl.appendChild(d);
  });
}
function renderRoom(){
  [].forEach.call(roomEl.querySelectorAll('.furni'), function(n){ n.remove(); });
  Rewards.byCat('room').forEach(function(it){
    if(!Rewards.isOwned(it.id)) return;
    var f = FURNI[it.id]; if(!f) return;
    var d = document.createElement('div');
    d.className = 'furni'; d.setAttribute('style', f.style);
    d.innerHTML = f.html;
    roomEl.insertBefore(d, stageEl);
  });
}
function renderPurse(){
  var bal = Rewards.balance();
  document.getElementById('purseN').textContent = bal;
  var P = Rewards.PRICE;
  var toward = Math.min(bal, P);
  document.getElementById('gaugeFill').style.width = Math.round(toward/P*100)+'%';
  document.getElementById('gaugeLab').textContent = bal+'/'+P;

  var btn = document.getElementById('btnDraw');
  var all = document.getElementById('allGet');
  var sub = document.getElementById('lotSub');
  if(Rewards.allCollected()){
    btn.hidden = true; all.hidden = false;
    sub.textContent = 'ごほうびを ぜんぶ あつめたよ！';
  } else if(Rewards.canDraw()){
    btn.hidden = false; all.hidden = true; btn.disabled = false; btn.classList.add('ready');
    sub.textContent = 'くじが ひけるよ！なにが でるかな？';
  } else {
    btn.hidden = false; all.hidden = true; btn.disabled = true; btn.classList.remove('ready');
    var need = P - bal;
    sub.textContent = 'あと '+need+'こ どんぐりを あつめよう！';
  }
}

/* ====== ずかん（タブ） ====== */
var curTab = 'wear';
function miniPreview(id){
  // 着せ替え：acc をそのまま縮小。家具：FURNI を縮小して中央に。
  var it = Rewards.byId(id);
  if(it.cat==='room'){
    var f = FURNI[id];
    return '<div class="pv" style="transform:scale(.78)">'+
      '<div class="furni" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);'+
      (f.style.replace(/(top|bottom|left|right|transform|z-index)\s*:[^;]*;?/g,''))+'">'+f.html+'</div></div>';
  }
  return '<div class="pv"><div class="'+accClass(id)+'">'+accInner(id)+'</div></div>';
}
function renderZukan(){
  var box = document.getElementById('zukan');
  var hint = document.getElementById('zukanHint');
  box.innerHTML='';
  if(curTab==='wear'){
    [['hat','あたま'],['face','かお'],['neck','くび']].forEach(function(c){
      var h=document.createElement('div'); h.className='cat-h';
      h.innerHTML='<span class="dot"></span>'+c[1];
      box.appendChild(h);
      var g=document.createElement('div'); g.className='grid';
      Rewards.byCat(c[0]).forEach(function(it){ g.appendChild(makeSlot(it,true)); });
      box.appendChild(g);
    });
    hint.textContent='タップで きせかえ／もう いちど タップで ぬげるよ';
  } else {
    var g=document.createElement('div'); g.className='grid';
    Rewards.byCat('room').forEach(function(it){ g.appendChild(makeSlot(it,false)); });
    box.appendChild(g);
    hint.textContent='もっている かぐは おへやに かざられるよ';
  }
}
function makeSlot(it, wearable){
  var b=document.createElement('button'); b.className='slot';
  var owned = Rewards.isOwned(it.id);
  if(!owned){
    b.className='slot locked';
    b.innerHTML='<span class="q">？</span>';
    b.setAttribute('aria-label','まだ もっていない');
    return b;
  }
  var on = wearable && Rewards.isWearing(it.id);
  if(on) b.classList.add('on');
  b.innerHTML = miniPreview(it.id) +
    '<span class="check"></span><span class="nm">'+it.name+'</span>';
  b.setAttribute('aria-label', it.name + (on?'（きている）':''));
  if(wearable){
    b.addEventListener('click', function(){
      sfx('tap');
      if(Rewards.isWearing(it.id)) Rewards.setWear(it.cat, null);
      else Rewards.setWear(it.cat, it.id);
      sfx('pop');
      renderUni(); renderZukan();
    });
  }
  return b;
}

document.getElementById('tabWear').addEventListener('click', function(){ selTab('wear'); });
document.getElementById('tabRoom').addEventListener('click', function(){ selTab('room'); });
function selTab(t){
  if(curTab===t) return; sfx('tap'); curTab=t;
  document.getElementById('tabWear').setAttribute('aria-selected', t==='wear');
  document.getElementById('tabRoom').setAttribute('aria-selected', t==='room');
  renderZukan();
}

/* ====== くじ ====== */
var pendingPrize = null;
document.getElementById('btnDraw').addEventListener('click', function(){
  if(!Rewards.canDraw()) return;
  var item = Rewards.draw();
  if(!item) return;
  sfx('whoosh');
  pendingPrize = item;
  // オーバーレイ（たまご）を出す
  var prize = document.getElementById('prize');
  prize.classList.remove('opened');
  document.getElementById('ovl').hidden = false;
});
document.getElementById('egg').addEventListener('click', openEgg);
function openEgg(){
  var prize = document.getElementById('prize');
  if(prize.classList.contains('opened')) return;
  var item = pendingPrize; if(!item) return;
  sfx('fanfare');
  // 中身プレビュー
  document.getElementById('gotpv').innerHTML =
    (item.cat==='room') ? miniPreview(item.id) : ('<div class="'+accClass(item.id)+'">'+accInner(item.id)+'</div>');
  document.getElementById('pname').textContent = item.name + ' を ゲット！';
  prize.classList.add('opened');
  // 演出
  try{
    var r = document.getElementById('gotpv').getBoundingClientRect();
    fx('burst', r.left+r.width/2, r.top+r.height/2, {count:26});
    fx('confetti');
  }catch(e){}
}
document.getElementById('prizeOk').addEventListener('click', function(){
  sfx('ding');
  document.getElementById('ovl').hidden = true;
  pendingPrize = null;
  renderUni(); renderRoom(); renderPurse(); renderZukan();
});
document.getElementById('ovl').addEventListener('click', function(e){
  // たまご未開封なら背景タップで開ける、開封後は閉じない（ボタン誘導）
  if(e.target===this){
    if(!document.getElementById('prize').classList.contains('opened')) openEgg();
  }
});

/* ====== もどる ====== */
document.getElementById('btnHome').addEventListener('click', function(){
  sfx('tap');
  setTimeout(function(){ location.href='index.html'; }, 100);
});

/* ====== 初期化 ====== */
renderRoom(); renderUni(); renderPurse(); renderZukan();
</script>
<script>try{ Bgm.play('room'); }catch(e){}</script>
</body>
</html>
