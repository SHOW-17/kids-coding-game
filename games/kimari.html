<style>
  :root{
    --accent:#5cc8e8; --accent-d:#2fa6cc; --accent-l:#cfeeff;
    --bg-2:#dff4fc; --bg-3:#bfe6f6;
  }
  body{display:flex; flex-direction:column; align-items:center;
       background:
        radial-gradient(120% 80% at 15% -10%, #eef9ff 0%, transparent 55%),
        radial-gradient(120% 80% at 95% 0%, #dff4fc 0%, transparent 50%),
        linear-gradient(180deg,#dff4fc 0%, #bfe6f6 100%);}

  .wrap{width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; flex:1; padding:0 10px 16px;}

  /* 状態バー */
  .statusbar{display:flex; gap:10px; align-items:center; justify-content:center;
    flex-wrap:wrap; margin:6px 0 2px;}
  .score-pill{font-family:'Mochiy Pop One'; background:#fff; box-shadow:var(--sh-1);
    padding:8px 16px; border-radius:999px; font-size:17px; color:var(--accent-d);}
  .best-pill{font-weight:800; background:#fff7; box-shadow:var(--sh-1);
    padding:8px 14px; border-radius:999px; font-size:14px; color:var(--ink-soft);}
  .streak-pill{font-family:'Mochiy Pop One'; background:var(--honey); color:#fff;
    box-shadow:0 4px 0 var(--honey-d); padding:8px 16px; border-radius:999px;
    font-size:16px; transition:transform .2s var(--spring);}
  .streak-pill.bump{transform:scale(1.18);}

  .hint{font-weight:800; font-size:18px; color:var(--accent-d); min-height:26px;
    text-align:center; margin:10px 0 6px;}

  /* ならび（出題列） */
  .seq-card{width:100%; background:var(--paper); border-radius:var(--r-lg);
    box-shadow:var(--sh-2); padding:16px 12px; margin:4px 0 10px;}
  .seq{display:flex; gap:6px; justify-content:center; align-items:center;
    flex-wrap:nowrap;}
  .tile{
    display:flex; align-items:center; justify-content:center;
    border-radius:18px; background:var(--cream);
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.07), 0 3px 8px rgba(0,0,0,.08);
    flex:0 0 auto;
  }
  /* タイルサイズはマス数で動的。狭い端末(～320px)でも 1行に収まるよう
     「列が増えたら自動で小さく」なる上限つきの calc（min）で算出。
     利用できる横幅 ≒ (100vw − 余白) を マス数で割る。 */
  .tile{ --side:48px; width:var(--side); height:var(--side);
    font-size:calc(var(--side) * 0.58); }
  .seq[data-n="4"]{ --avail:calc((100vw - 64px) / 4); }
  .seq[data-n="5"]{ --avail:calc((100vw - 76px) / 5); }
  .seq[data-n="6"]{ --avail:calc((100vw - 84px) / 6); }
  .seq[data-n="7"]{ --avail:calc((100vw - 90px) / 7); }
  .seq[data-n="8"]{ --avail:calc((100vw - 96px) / 8); }
  .seq[data-n="9"]{ --avail:calc((100vw - 100px) / 9); }
  .seq[data-n="4"] .tile{ --side:min(62px, var(--avail)); }
  .seq[data-n="5"] .tile{ --side:min(60px, var(--avail)); }
  .seq[data-n="6"] .tile{ --side:min(54px, var(--avail)); }
  .seq[data-n="7"] .tile{ --side:min(48px, var(--avail)); }
  .seq[data-n="8"] .tile{ --side:min(42px, var(--avail)); }
  .seq[data-n="9"] .tile{ --side:min(38px, var(--avail)); }
  .glyph{line-height:1; transition:transform .25s var(--spring);}

  /* ？タイル（こたえる場所） */
  .tile.qmark{background:linear-gradient(160deg,var(--accent-l),#fff);
    box-shadow:inset 0 0 0 4px var(--accent), 0 4px 12px rgba(47,166,204,.35);
    color:var(--accent-d); font-family:'Mochiy Pop One';
    animation:qpulse 1.1s var(--ease) infinite;}
  @keyframes qpulse{0%,100%{transform:scale(1); box-shadow:inset 0 0 0 4px var(--accent),0 4px 12px rgba(47,166,204,.35);}
    50%{transform:scale(1.1); box-shadow:inset 0 0 0 5px var(--accent),0 6px 20px rgba(47,166,204,.55);}}
  .tile.qmark.solved{animation:none; background:var(--cream);
    box-shadow:inset 0 -5px 0 rgba(0,0,0,.07),0 3px 8px rgba(0,0,0,.08);
    color:var(--ink);}
  .tile.reveal .glyph{animation:flip-in .5s var(--spring);}
  @keyframes flip-in{0%{transform:rotateY(90deg) scale(.5);}60%{transform:rotateY(0) scale(1.2);}100%{transform:scale(1);}}

  /* ドット絵（かずパターン用） */
  .dotgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:3px;
    width:74%; height:74%; align-items:center; justify-items:center;}
  .seq[data-n="6"] .dotgrid,.seq[data-n="7"] .dotgrid,.seq[data-n="8"] .dotgrid,.seq[data-n="9"] .dotgrid{gap:2px;}
  .dot{width:100%; aspect-ratio:1; border-radius:50%; background:var(--c-blue);
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);}
  .dot.off{background:transparent; box-shadow:none;}

  /* やじるし（むき回転用）— 絵文字を回す */
  .arrow{display:inline-block;}

  /* こたえ つなぎ */
  .ask{font-family:'Mochiy Pop One'; font-size:20px; color:var(--accent-d);
    text-align:center; margin:2px 0 8px;}

  /* せんたくし */
  .choices{display:flex; gap:14px; justify-content:center; align-items:stretch;
    margin-top:6px; width:100%;}
  .choice{
    flex:1 1 0; max-width:118px; aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper); border-radius:22px; font-size:44px;
    box-shadow:0 6px 0 var(--line), 0 10px 18px rgba(120,160,180,.22);
    transition:transform .12s var(--spring), box-shadow .12s var(--ease), filter .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .choice:active{transform:translateY(5px); box-shadow:0 1px 0 var(--line);}
  .choice.wrong{animation:wrongflash .4s; }
  @keyframes wrongflash{0%,100%{background:var(--paper);}40%{background:#ffd6d6;}}
  .choice.correctpick{background:#d7f7e0; box-shadow:0 6px 0 var(--c-green-d),0 10px 18px rgba(120,160,180,.22);}
  .choice.locked{pointer-events:none;}
  .choice .glyph{line-height:1;}
  .choice .dotgrid{width:64%; height:64%;}

  /* せんたくし内の数ドットは少し小さめ */
  .choice .dot{box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);}
</style>
</head>
<body>

<div class="topbar safe-top" id="topbar"></div>

<div class="wrap">
  <div class="statusbar enter">
    <span class="score-pill" id="scorePill">⭐ 0もん</span>
    <span class="streak-pill" id="streakPill">🔥 0</span>
    <span class="best-pill" id="bestPill">🏆 0</span>
  </div>

  <div class="hint enter d1" id="hint">つぎは なにかな？ 🤔</div>

  <div class="seq-card enter d2">
    <div class="seq" id="seq"></div>
  </div>

  <div class="ask enter d3">⬇ どれかな？ ⬇</div>

  <div class="choices enter d4" id="choices"></div>
</div>

<script src="../assets/audio.js"></script>
<script src="../assets/fx.js"></script>
<script src="../assets/save.js"></script>
<script src="../assets/shell.js"></script>
<script>
/* ====== きまり あそび（パターン推理） ====== */
const save = Save.game('kimari');
const seqEl = document.getElementById('seq');
const choicesEl = document.getElementById('choices');
const hintEl = document.getElementById('hint');
const scorePill = document.getElementById('scorePill');
const streakPill = document.getElementById('streakPill');
const bestPill = document.getElementById('bestPill');

/* ヘッダー */
document.getElementById('topbar').replaceWith(
  App.topbar({ title:'きまり あそび', back:'../index.html' })
);

/* 進捗（累計せいかい数・最高れんぞく） */
let total = save.get('cleared', 0);
let streak = 0;
let best = save.get('best', 0);
let qIndex = 0;        // 出した問題数（難易度に使う）
let current = null;    // 今の問題
let locked = false;

renderStatus();

function renderStatus(){
  scorePill.textContent = '⭐ ' + total + 'もん';
  streakPill.textContent = '🔥 ' + streak;
  bestPill.textContent = '🏆 ' + best;
}

/* ---------- パーツ表現（すべて絵文字・図形・ドット。文字は使わない） ---------- */
// 色つき丸（色の交互・くりかえし用）。色だけでなく形/顔でも区別がつくよう絵文字を使う
const COLOR_TOKENS = ['🔴','🔵','🟡','🟢','🟣','🟠'];
const SHAPE_TOKENS = ['🐶','🐱','🐰','🐸','🐥','🐼','🦊','🐻'];
const FRUIT_TOKENS = ['🍎','🍌','🍇','🍊','🍓','🍑'];
// むき（回転）：上→右→下→左 のくりかえし
const ARROW_TOKENS = ['⬆️','➡️','⬇️','⬅️'];

/* 表示要素を作る。tokenの種類で出し分け */
function makeGlyph(token){
  // ドット数（かずパターン）は {dots:n} で渡す
  if (token && token.dots != null){
    return makeDotGrid(token.dots);
  }
  // 大きさ交互は {big:bool, emo:'⭐'}
  if (token && token.emo != null){
    const g = document.createElement('span');
    g.className = 'glyph';
    g.textContent = token.emo;
    g.style.fontSize = token.big ? '1em' : '0.55em';
    return g;
  }
  const g = document.createElement('span');
  g.className = 'glyph';
  g.textContent = token;
  return g;
}

function makeDotGrid(n){
  // 1..6 のドットを 3x2 グリッドで決まった位置に置く
  const grid = document.createElement('div');
  grid.className = 'dotgrid';
  // 各個数の点灯パターン（位置固定で見やすく）
  const PATTERNS = {
    1:[4], 2:[0,5], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8]
  };
  const on = new Set(PATTERNS[n] || []);
  for (let i=0;i<9;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (on.has(i) ? '' : ' off');
    grid.appendChild(d);
  }
  return grid;
}

/* tokenの「同じか」判定（選択肢の重複チェック・正解判定に使う） */
function tokenKey(t){
  if (t && t.dots != null) return 'dots:' + t.dots;
  if (t && t.emo != null) return 'emo:' + t.emo + ':' + (t.big?'B':'s');
  return 'g:' + t;
}

/* ---------- パターン・ジェネレータ ----------
   各 generator は {seq:[...tokens...], answer:token, distractors:[...]} を返す。
   seq は ？ を除いた「見える並び」。answer が正解、distractors が誤答候補（多めに）。 */

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* 共通：くりかえし単位 unit[] から len 個ぶんの列とこたえを作る。
   こたえ＝列の次（位置 len）。誤答は unit 内の他要素＋tokens の他の絵柄。 */
function fromUnit(unit, len, tokens){
  const seq = [];
  for(let i=0;i<len;i++) seq.push(unit[i%unit.length]);
  const answer = unit[len%unit.length];
  // 紛らわしい誤答：unit 内の他のコマ（＝「同じ並びの別の位置」のもの）を最優先
  const ansKey = tokenKey(answer);
  const dist = [];
  unit.forEach(u=>{ if (tokenKey(u)!==ansKey) dist.push(u); });
  (tokens||[]).forEach(t=>dist.push(t));
  return { seq, answer, distractors: dist };
}

// A) AB くりかえし
function genAlt(tokens, len){
  const set = shuffle(tokens).slice(0,2);
  return fromUnit([set[0],set[1]], len, tokens);
}

// B) AABB のくりかえし
function genAABB(tokens, len){
  const set = shuffle(tokens).slice(0,2);
  return fromUnit([set[0],set[0],set[1],set[1]], len, tokens);
}

// B2) AAB のくりかえし
function genAAB(tokens, len){
  const set = shuffle(tokens).slice(0,2);
  return fromUnit([set[0],set[0],set[1]], len, tokens);
}

// B3) ABB のくりかえし
function genABB(tokens, len){
  const set = shuffle(tokens).slice(0,2);
  return fromUnit([set[0],set[1],set[1]], len, tokens);
}

// C) ABC くりかえし
function genABC(tokens, len){
  const set = shuffle(tokens).slice(0,3);
  return fromUnit([set[0],set[1],set[2]], len, tokens);
}

// C2) ABCD くりかえし
function genABCD(tokens, len){
  const set = shuffle(tokens).slice(0,4);
  return fromUnit([set[0],set[1],set[2],set[3]], len, tokens);
}

// D) かず（ドット）等差：step は +1/+2/-1。列＋こたえ が必ず 1..6 に収まる start を選ぶ。
function genCount(len, step){
  step = step || 1;
  // 値の系列 v(i)=start+step*i を i=0..len まで（こたえ含む len+1 個）すべて 1..6 に。
  const lo = [], hi = [];
  for(let i=0;i<=len;i++){ lo.push(step*i); hi.push(step*i); }
  // start の取りうる範囲：1<=start+step*i<=6 すべて満たす
  let smin=1, smax=6;
  for(let i=0;i<=len;i++){
    smin = Math.max(smin, 1 - step*i);
    smax = Math.min(smax, 6 - step*i);
  }
  if (smin > smax){ // 念のため：レンジが取れなければ +1 に退避
    return genCount(Math.min(len,4), 1);
  }
  const start = smin + Math.floor(Math.random()*(smax-smin+1));
  const seq = [];
  for(let i=0;i<len;i++) seq.push({dots: start+step*i});
  const answer = {dots: start+step*len};
  // 誤答：隣の数を優先（紛らわしく）、続いて 1..6 の残り
  const cand = [];
  [answer.dots-1, answer.dots+1, answer.dots-2, answer.dots+2].forEach(d=>{
    if (d>=1 && d<=6 && d!==answer.dots) cand.push({dots:d});
  });
  for(let d=1; d<=6; d++) if (d !== answer.dots) cand.push({dots:d});
  return { seq, answer, distractors: cand };
}

// D2) かず やまがた（増えて減る）：1,2,3,2,1.. のような山をくりかえす。次の値を当てる。
function genCountMountain(){
  const peak = 3 + Math.floor(Math.random()*2);   // 山のてっぺん 3..4（周期を短くして列に収める）
  // 周期：1,2,..,peak,peak-1,..,2（端の1は次周期の頭と重複しないよう片側だけ）
  const up = []; for(let v=1; v<=peak; v++) up.push(v);
  const down = []; for(let v=peak-1; v>=2; v--) down.push(v);
  const unit = up.concat(down).map(v=>({dots:v})); // peak3: 1,2,3,2(周期4) / peak4: 1,2,3,4,3,2(周期6)
  const len = 6 + Math.floor(Math.random()*2);     // 見える列 6..7（山を1周以上は見せる）
  const seq = [];
  for(let i=0;i<len;i++) seq.push(unit[i%unit.length]);
  const answer = unit[len%unit.length];
  const cand = [];
  [answer.dots-1, answer.dots+1].forEach(d=>{ if(d>=1&&d<=6&&d!==answer.dots) cand.push({dots:d}); });
  for(let d=1; d<=6; d++) if (d !== answer.dots) cand.push({dots:d});
  return { seq, answer, distractors: cand };
}

// E) おおきさ こうご（小大小大..）
function genSize(){
  const all = ['⭐','❤️','🌸','🔵','🟢','🟠'];
  const emo = pick(all);
  const other = pick(all.filter(e=>e!==emo)); // ちがう えがら（おとり）
  const len = 4 + Math.floor(Math.random()*3);  // 4..6
  const seq = [];
  for(let i=0;i<len;i++) seq.push({emo, big: i%2===1}); // 小,大,小,大..
  const big = len%2===1;
  const answer = {emo, big};
  // 誤答1：おなじ えがらで 反対の おおきさ／誤答2：ちがう えがらで 正しい おおきさ
  const distractors = [{emo, big: !big}, {emo: other, big}, {emo: other, big: !big}];
  return { seq, answer, distractors };
}

// E2) 2ぞくせい どうじ：えがらが回る（A→B→C）＋ おおきさも こうご（小大小大）
function genTwoAttr(){
  const all = ['⭐','❤️','🌸','🔵','🟢','🟠','🍎','🐱'];
  const set = shuffle(all).slice(0,3);           // 3つの えがらを 順ぐり
  const len = 5 + Math.floor(Math.random()*2);   // 5..6
  const seq = [];
  for(let i=0;i<len;i++) seq.push({emo:set[i%3], big: i%2===1});
  const emo = set[len%3], big = len%2===1;
  const answer = {emo, big};
  // 誤答：えがら合ってる/大きさ違う、えがら違う/大きさ合ってる、両方ずれ
  const distractors = [
    {emo, big:!big},
    {emo:set[(len+1)%3], big},
    {emo:set[(len+2)%3], big:!big}
  ];
  return { seq, answer, distractors };
}

// F) むき（やじるし）回転 上→右→下→左（or 逆回転）
function genRotate(len){
  const start = Math.floor(Math.random()*4);
  const dir = Math.random()<0.5 ? 1 : 3;          // +1=右回り / +3(=-1)=左回り
  const unit = [];
  for(let i=0;i<4;i++) unit.push(ARROW_TOKENS[(start+dir*i)%4]);
  return fromUnit(unit, len, ARROW_TOKENS);
}

// G) とばし（A_A_A_ ）：ぐうすうの位置はいつも A で固定、きすうの位置は B→C→D と回る。
//    例 🐶🍎🐶🍌🐶🍇 → つぎ(7番目=偶数位置)は 🐶。規則「ひとつおきに同じ」を読み取らせる。
function genSkip(tokens, len){
  const pool = shuffle(tokens);
  const A = pool[0];                       // 固定で出る方
  const others = pool.slice(1, 1+3);       // 間に回る 3つ（最低3種ある前提：各 TOKENS は6種）
  const unit = [A, others[0], A, others[1], A, others[2]]; // 周期6：A _ A _ A _
  return fromUnit(unit, len, tokens);
}

/* 難易度に応じて出題を選ぶ。難易度カーブは急め：
   さいしょの2問だけ軽いウォームアップ。そのあとは種類・列の長さ・紛らわしさを段階的に強める。
   各 tier は使える gen と「列の長さ候補(len)」を持つ。エンドレスで、後半ほど難しくなる。 */
const TOK = ()=>pick([COLOR_TOKENS, SHAPE_TOKENS, FRUIT_TOKENS]);

// gen 名 → 実体。len を受けるものと受けないものがある。
function runGen(name, len){
  switch(name){
    case 'alt':    return genAlt(TOK(), len);
    case 'aabb':   return genAABB(TOK(), len);
    case 'aab':    return genAAB(TOK(), len);
    case 'abb':    return genABB(TOK(), len);
    case 'abc':    return genABC(TOK(), len);
    case 'abcd':   return genABCD(TOK(), len);
    case 'skip':   return genSkip(TOK(), len);
    case 'rotate': return genRotate(len);
    case 'count1': return genCount(len, 1);
    case 'count2': return genCount(len, 2);
    case 'countm1':return genCount(len, -1);
    case 'mountain':return genCountMountain();
    case 'size':   return genSize();
    case 'twoattr':return genTwoAttr();
    default:       return genAlt(TOK(), len);
  }
}

// tier 定義（idx の境界・使える gen・len 候補）。あとの tier ほど難しい gen と長い len。
const TIERS = [
  // ウォームアップ（最初の2問）：超やさしい AB交互・短い
  { until:2,        gens:['alt','rotate'],                                  lens:[4] },
  // 立ち上がり：交互/くりかえし/かず増加・少し長く
  { until:5,        gens:['alt','aabb','count1','rotate'],                  lens:[5,6] },
  // 中盤：3種くりかえし・AAB/ABB・かず±2や-1・おおきさ
  { until:9,        gens:['abc','aab','abb','count1','count2','countm1','rotate','size'], lens:[6,7] },
  // 中盤後半：ABCD・とばし・山型・2属性 が登場、列さらに長く
  { until:14,       gens:['abc','abcd','aabb','skip','count2','countm1','mountain','twoattr','size','rotate'], lens:[7,8] },
  // 終盤（エンドレス）：難しい gen 中心・最長列・紛らわしさ最大
  { until:Infinity, gens:['abcd','skip','abc','mountain','twoattr','count2','countm1','aabb','size','rotate'], lens:[8] }
];

function buildProblem(idx, depth){
  depth = depth || 0;
  const tier = TIERS.find(t=>idx < t.until) || TIERS[TIERS.length-1];
  const name = pick(tier.gens);
  const len = pick(tier.lens);
  const raw = runGen(name, len);
  return finalizeProblem(raw, depth);
}

/* 3択を作る：正解1＋誤答2。重複ゼロ・正解はちょうど1つ になるよう検証 */
function finalizeProblem(raw, depth){
  depth = depth || 0;
  const ansKey = tokenKey(raw.answer);
  // 誤答候補から「正解と違うキー」だけ集めて重複排除
  const seen = new Set([ansKey]);
  const distinct = [];
  shuffle(raw.distractors).forEach(d=>{
    const k = tokenKey(d);
    if (!seen.has(k)){ seen.add(k); distinct.push(d); }
  });
  // 足りない場合の保険：かず問題はドット、それ以外は絵柄でうめる（種類が混ざりにくいよう）
  let FALLBACK;
  if (raw.answer && raw.answer.dots != null){
    FALLBACK = [1,2,3,4,5,6].map(d=>({dots:d}));
  } else {
    FALLBACK = COLOR_TOKENS.concat(SHAPE_TOKENS, FRUIT_TOKENS);
  }
  let fi = 0;
  while (distinct.length < 2 && fi < FALLBACK.length){
    const d = FALLBACK[fi++]; const k = tokenKey(d);
    if (!seen.has(k)){ seen.add(k); distinct.push(d); }
  }
  // それでも足りない（理論上ありえない）場合は作り直し
  if (distinct.length < 2 && depth < 8){
    return buildProblem(qIndex, depth+1);
  }
  const choices = shuffle([raw.answer, distinct[0], distinct[1]]);
  // 検証：3択そろっていて 正解キーがちょうど1つ・重複なし
  const keys = choices.map(tokenKey);
  const correctCount = keys.filter(k=>k===ansKey).length;
  const allDefined = choices.every(c=>c != null);
  const noDup = new Set(keys).size === keys.length;
  if (choices.length !== 3 || correctCount !== 1 || !allDefined || !noDup){
    // 生成が崩れたら作り直し（極めて稀）。再帰の暴走を防ぐため上限つき。
    if (depth < 8) return buildProblem(qIndex, depth+1);
  }
  return { seq: raw.seq, answer: raw.answer, ansKey, choices };
}

/* ---------- 描画 ---------- */
function renderProblem(p){
  // ならび（？を末尾に）
  const n = p.seq.length + 1;
  seqEl.dataset.n = Math.min(9, n);
  seqEl.innerHTML = '';
  p.seq.forEach((tok,i)=>{
    const t = document.createElement('div');
    t.className = 'tile enter d' + (Math.min(6,i+1));
    t.appendChild(makeGlyph(tok));
    seqEl.appendChild(t);
  });
  const q = document.createElement('div');
  q.className = 'tile qmark enter d' + Math.min(6, p.seq.length+1);
  q.textContent = '？';
  q.id = 'qtile';
  seqEl.appendChild(q);

  // せんたくし
  choicesEl.innerHTML = '';
  p.choices.forEach((tok,i)=>{
    const c = document.createElement('button');
    c.className = 'choice enter d' + (i+1);
    c.appendChild(makeGlyph(tok));
    c.addEventListener('pointerdown', ()=>onPick(c, tok), {passive:true});
    choicesEl.appendChild(c);
  });
  hintEl.textContent = 'つぎは なにかな？ 🤔';
}

function nextProblem(){
  locked = false;
  current = buildProblem(qIndex);
  renderProblem(current);
}

/* ---------- こたえる ---------- */
function onPick(btn, tok){
  if (locked) return;
  Sfx.tap();
  if (tokenKey(tok) === current.ansKey){
    correctAnswer(btn, tok);
  } else {
    wrongAnswer(btn);
  }
}

function correctAnswer(btn, tok){
  locked = true;
  [...choicesEl.children].forEach(c=>c.classList.add('locked'));
  btn.classList.add('correctpick');
  Sfx.ding(); Sfx.success();
  App.buzz(16);

  // ？タイルを正解に差し替え
  const q = document.getElementById('qtile');
  if (q){
    q.classList.add('solved','reveal');
    q.textContent = '';
    q.appendChild(makeGlyph(tok));
  }

  // エフェクト（押した選択肢の位置で）
  const r = btn.getBoundingClientRect();
  FX.sparkles(r.left+r.width/2, r.top+r.height/2, {count:12, color:'#ffd23f'});
  FX.burst(r.left+r.width/2, r.top+r.height/2, {count:16});
  FX.floatEmoji(r.left+r.width/2, r.top, pick(['🎉','✨','💮','🌟']));

  // スコア更新
  total++; streak++;
  if (streak > best){ best = streak; save.bestMax('best', best); }
  save.set('cleared', total);
  renderStatus();
  streakPill.classList.add('bump');
  setTimeout(()=>streakPill.classList.remove('bump'), 220);

  hintEl.textContent = pick(['せいかい！ 🎉','できた！ ✨','すごい！ 👏','ばっちり！ 🌟']);

  qIndex++;

  // 5もんごとに ごほうび
  if (total % 5 === 0){
    setTimeout(()=>milestone(), 700);
  } else {
    setTimeout(()=>nextProblem(), 950);
  }
}

function wrongAnswer(btn){
  // 減点しない・問題はそのまま。やさしく もういちど
  Sfx.error();
  App.buzz([20,30,20]);
  btn.classList.add('wrong');
  FX.shake(btn, 7, 320);
  setTimeout(()=>btn.classList.remove('wrong'), 420);
  streak = 0; renderStatus();
  hintEl.textContent = 'もういちど！ 🤔';
  App.toast('もういちど みてみよう 👀');
}

function milestone(){
  Sfx.fanfare();
  FX.celebrate();
  App.showModal({
    emoji: total>=30 ? '🏆' : total>=15 ? '🌈' : '🎉',
    title: 'すごい！ ' + total + 'もん せいかい！',
    text: 'れんぞく さいこう 🔥' + best + '<br>この ちょうしで つづけよう！',
    buttons:[
      {label:'🏠 おうち', cls:'btn--ghost', onClick:()=>App.go('../index.html')},
      {label:'つぎへ ▶', cls:'btn--green', onClick:()=>{ Sfx.whoosh(); nextProblem(); }}
    ]
  });
}

/* スタート */
nextProblem();
</script>
