<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>まねっこ — あそびのもり</title>
<meta name="description" content="ひかった じゅんばんを おぼえて まねっこ。きおくと しゅうちゅうの あそび。">
<meta name="theme-color" content="#9165e0">
<link rel="icon" href="../favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="まねっこ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/arcade.css">
<style>
  :root{
    --accent:#b58cff; --accent-d:#9165e0; --accent-l:#e2d2ff;
    --bg-2:#efe3ff; --bg-3:#dcc6ff;
  }
  body{display:flex; flex-direction:column; align-items:center;
       background:
        radial-gradient(120% 80% at 15% -10%, #f6efff 0%, transparent 55%),
        radial-gradient(120% 80% at 95% 0%, #efe3ff 0%, transparent 50%),
        linear-gradient(180deg,#efe3ff 0%, #dcc6ff 100%);}

  .wrap{width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; flex:1;}

  /* じょうたいバー */
  .statusbar{display:flex; gap:10px; align-items:center; margin:6px 0 4px;}
  .round-pill{font-family:'Mochiy Pop One'; background:#fff; box-shadow:var(--sh-1);
    padding:8px 18px; border-radius:999px; font-size:18px; color:var(--accent-d);}
  .best-pill{font-weight:800; background:#fff7; box-shadow:var(--sh-1);
    padding:8px 14px; border-radius:999px; font-size:14px; color:var(--ink-soft);}

  .hint{font-weight:800; font-size:17px; color:var(--ink-soft); min-height:26px;
    text-align:center; margin:8px 0; transition:color .2s;}
  .hint.watch{color:var(--accent-d);}
  .hint.your{color:var(--c-green-d);}

  /* サイモン・ダイヤル（よこ・たて どちらでも はみでない） */
  .dial-wrap{position:relative; width:min(86vw,72vh,400px); aspect-ratio:1; margin:6px 0 4px;}
  .dial{position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr; gap:14px; border-radius:50%;
    padding:0; transition:transform .3s var(--spring);}
  .pad{
    position:relative; border:none; cursor:pointer; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(34px,12vw,56px);
    box-shadow:inset 0 -8px 0 rgba(0,0,0,.18), 0 6px 14px rgba(0,0,0,.15);
    filter:brightness(.82) saturate(.9);
    transition:filter .12s, transform .12s var(--spring);
    -webkit-tap-highlight-color:transparent;
  }
  .pad:active{transform:scale(.97);}
  .pad.tl{border-radius:100% 18px 18px 18px;}
  .pad.tr{border-radius:18px 100% 18px 18px;}
  .pad.bl{border-radius:18px 18px 18px 100%;}
  .pad.br{border-radius:18px 18px 100% 18px;}
  .pad[data-c="0"]{background:#5fcf80;}
  .pad[data-c="1"]{background:#ff6b6b;}
  .pad[data-c="2"]{background:#ffce2e;}
  .pad[data-c="3"]{background:#5cc8e8;}
  .pad .face{filter:drop-shadow(0 2px 2px rgba(0,0,0,.18)); transition:transform .15s var(--spring);}
  /* てんとう じょうたい */
  .pad.lit{filter:brightness(1.35) saturate(1.2); box-shadow:inset 0 -8px 0 rgba(255,255,255,.25),
    0 0 40px rgba(255,255,255,.7), 0 6px 14px rgba(0,0,0,.15);}
  .pad.lit .face{transform:scale(1.25) translateY(-2px);}
  .dial.locked .pad{cursor:default;}

  /* ちゅうおう ハブ */
  .hub{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:30%; aspect-ratio:1; border-radius:50%; background:var(--cream);
    box-shadow:0 6px 0 #d9c8ee, inset 0 0 0 6px #fff;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    z-index:5; font-family:'Mochiy Pop One'; color:var(--accent-d);}
  .hub .big{font-size:clamp(28px,9vw,40px); line-height:1;}
  .hub .lbl{font-size:11px; color:var(--ink-faint); margin-top:2px;}

  /* スタートがめん オーバーレイ（ダイヤルの うえに かさねる） */
  .startcover{position:absolute; inset:0; z-index:8; border-radius:50%;
    background:rgba(255,255,255,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center;
    transition:opacity .3s; }
  .startcover.hide{opacity:0; pointer-events:none;}

  /* したの コントロール */
  .controls{display:flex; gap:14px; align-items:center; justify-content:center;
    margin-top:14px; min-height:74px; padding-bottom:env(safe-area-inset-bottom);}
  .peek{visibility:hidden;}
  .peek.show{visibility:visible;}

  /* せまい たんまつ（320px くらい）でも はみでない */
  @media (max-width:360px){
    .round-pill{font-size:16px; padding:7px 14px;}
    .best-pill{font-size:13px; padding:7px 11px;}
    .hint{font-size:15px;}
    .peek{font-size:17px; padding:0 18px;}
  }

  /* よこむき：たてに つめて ダイヤルを みせる */
  @media (orientation:landscape) and (max-height:520px){
    .statusbar{margin:2px 0;}
    .hint{margin:4px 0; min-height:20px;}
    .dial-wrap{width:min(58vh,86vw,400px); margin:2px 0;}
    .controls{margin-top:8px; min-height:60px;}
  }
</style>
</head>
<body>

<div class="topbar safe-top" id="topbar"></div>

<div class="wrap">
  <div class="statusbar enter">
    <span class="round-pill" id="roundPill">だん 0</span>
    <span class="best-pill" id="bestPill">🏆 さいこう 0</span>
  </div>

  <div class="hint enter d1" id="hint">みどりの ▶ で スタート！</div>

  <div class="dial-wrap enter d2">
    <div class="dial locked" id="dial">
      <button class="pad tl" data-c="0" aria-label="かえる"><span class="face">🐸</span></button>
      <button class="pad tr" data-c="1" aria-label="きつね"><span class="face">🦊</span></button>
      <button class="pad bl" data-c="3" aria-label="いるか"><span class="face">🐬</span></button>
      <button class="pad br" data-c="2" aria-label="ひよこ"><span class="face">🐤</span></button>
    </div>
    <div class="hub" id="hub"><div class="big" id="hubBig">🎵</div><div class="lbl" id="hubLbl">まねっこ</div></div>
    <div class="startcover" id="startcover">
      <button class="btn-play" id="startBtn" aria-label="スタート">▶</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn--ghost peek" id="peekBtn">👀 もういちど みる</button>
  </div>
</div>

<script src="../assets/audio.js"></script>
<script src="../assets/fx.js"></script>
<script src="../assets/save.js"></script>
<script src="../assets/shell.js"></script>
<script>
/* ====== まねっこ（サイモン） ====== */
const save = Save.game('manekko');
const dial = document.getElementById('dial');
const pads = [...dial.querySelectorAll('.pad')]
  .sort((a,b)=>(+a.dataset.c)-(+b.dataset.c)); // index = データの いろ ばんごう
const hint = document.getElementById('hint');
const roundPill = document.getElementById('roundPill');
const bestPill = document.getElementById('bestPill');
const hubBig = document.getElementById('hubBig');
const hubLbl = document.getElementById('hubLbl');
const startcover = document.getElementById('startcover');
const peekBtn = document.getElementById('peekBtn');

// パッドごとの おと（やさしい アルペジオ）
const TONES = [329.63, 415.30, 493.88, 587.33]; // みどり・あか・きいろ・あお
let best = save.get('best', 0);
let bestAtStart = best;          // この あそびを はじめる まえの さいこう（おいわい はんてい よう）
let seq = [], inputPtr = 0, phase = 'idle', acceptInput = false;
let starting = false;            // たじゅう スタート ぼうし
let runId = 0;                   // さいせい・にゅうりょくの せだい（とちゅうで やりなおしても まざらない）
renderBest();

/* ヘッダー */
document.getElementById('topbar').replaceWith(
  App.topbar({ title:'まねっこ', back:'../index.html' })
);

function renderBest(){ bestPill.textContent = '🏆 さいこう ' + best; }
function setRound(n){ roundPill.textContent = 'だん ' + n; }
function rand4(){ return Math.floor(Math.random()*4); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* パッドを ひからせて ならす */
async function light(i, dur){
  const pad = pads[i];
  pad.classList.add('lit');
  Sfx.note(TONES[i], (dur||320)/1000 + 0.05, 'sine');
  App.buzz(14);
  const r = pad.getBoundingClientRect();
  try{ FX.ring(r.left+r.width/2, r.top+r.height/2, {color:'#fff', vr:6, life:18, lw:5}); }catch(e){}
  await wait(dur||320);
  pad.classList.remove('lit');
}

/* おてほん シーケンス さいせい */
async function playSequence(){
  const my = runId;
  phase = 'show'; acceptInput = false; dial.classList.add('locked');
  peekBtn.classList.remove('show');
  hint.textContent = 'よく みてね 👀'; hint.className = 'hint watch';
  hubBig.textContent = '👀'; hubLbl.textContent = 'みほん';
  await wait(620);
  if(my !== runId) return;                       // とちゅうで やりなおされたら ちゅうし
  // だんが ふえるほど すこし はやく（したかぎり あり・きつすぎない ひかえめ）
  const dur = Math.max(340, 560 - seq.length*12);
  const gap = Math.max(150, 260 - seq.length*5);
  for(const i of seq){
    if(my !== runId) return;
    await light(i, dur);
    if(my !== runId) return;
    await wait(gap);
  }
  if(my !== runId) return;
  // プレイヤーの ばん
  phase = 'input'; inputPtr = 0; acceptInput = true; dial.classList.remove('locked');
  hint.textContent = 'おなじ じゅんばんで まねっこ！'; hint.className = 'hint your';
  hubBig.textContent = '🖐️'; hubLbl.textContent = 'どうぞ';
  peekBtn.classList.add('show');
}

/* つぎの だんへ */
async function nextRound(){
  seq.push(rand4());
  setRound(seq.length);
  await playSequence();
}

/* ゲーム かいし */
async function startGame(){
  if(starting) return;                 // たじゅう スタート ぼうし（れんだ・モーダル）
  if(phase==='show' || phase==='input') return; // あそんで いる さいちゅうは むし
  starting = true;
  runId++;                             // あたらしい あそびの せだい
  Sfx.tap();
  bestAtStart = best;                  // この あそびの まえの さいこうを ひかえる
  startcover.classList.add('hide');
  seq = []; inputPtr = 0; setRound(0);
  await wait(280);
  starting = false;
  await nextRound();
}

/* パッド おした とき */
pads.forEach((pad,i)=>{
  pad.addEventListener('pointerdown', ()=>{
    if(!acceptInput || phase!=='input') return;
    light(i, 220);
    const expected = seq[inputPtr];
    if(i === expected){
      inputPtr++;
      if(inputPtr === seq.length){
        // この だん クリア
        acceptInput = false;
        roundClear();
      }
    } else {
      gameOver();
    }
  });
});

/* だんクリアの えんしゅつ → つぎへ */
async function roundClear(){
  const my = runId;
  phase = 'clear';                 // つぎの だんが はじまる まで にゅうりょく・のぞき むこう
  peekBtn.classList.remove('show');
  hint.textContent = 'せいかい！ ✨'; hint.className = 'hint your';
  hubBig.textContent = '🎉';
  Sfx.ding();
  const r = dial.getBoundingClientRect();
  FX.sparkles(r.left+r.width/2, r.top+r.height*0.3, {count:10, color:'#ffd23f'});
  // ベスト こうしん チェック
  if(seq.length > best){
    best = seq.length; save.set('best', best); renderBest();
  }
  await wait(720);
  if(my !== runId) return;          // とちゅうで やりなおされたら つぎへ いかない
  await nextRound();
}

/* ゲームオーバー（やさしく） */
function gameOver(){
  acceptInput = false; phase = 'over';
  dial.classList.add('locked');
  Sfx.error(); App.buzz([30,40,30]);
  FX.shake(document.querySelector('.dial-wrap'), 9, 360);
  // なんだんまで できたか = ちょくぜんに クリアした だんすう = seq.length-1
  const done = seq.length - 1;
  hubBig.textContent = '🙈'; hubLbl.textContent = 'おしい';
  hint.textContent = 'おしい！ もう いちど やってみよう'; hint.className = 'hint';
  // じこ さいこう = この あそびの まえの きろくを こえた とき だけ おいわい
  const isBest = (done > bestAtStart && done > 0);
  setTimeout(()=>{
    App.showModal({
      emoji: done>=8 ? '🏆' : done>=4 ? '🌟' : '🐻',
      title: done>0 ? (done + 'だん まで できたね！') : 'ドンマイ！',
      text: isBest ? 'じこ さいこう きろく！ すごい！'
                   : ('🏆 さいこうは ' + best + 'だん。<br>つぎは こえられるかな？'),
      buttons:[
        {label:'🏠 おうち', cls:'btn--ghost', onClick:()=>App.go('../index.html')},
        {label:'もう いちど ▶', cls:'btn--green', onClick:()=>{ resetIdle(); startGame(); }}
      ]
    });
    if(isBest){ Sfx.fanfare(); FX.celebrate(); }
  }, 700);
}

function resetIdle(){
  runId++;                         // のこって いる さいせいを むこうに する
  phase='idle'; seq=[]; inputPtr=0; acceptInput=false;
  dial.classList.add('locked');
  pads.forEach(p=>p.classList.remove('lit'));
  peekBtn.classList.remove('show');
  startcover.classList.remove('hide');
  hubBig.textContent='🎵'; hubLbl.textContent='まねっこ';
  hint.textContent='みどりの ▶ で スタート！'; hint.className='hint';
  setRound(0);
}

/* もういちど みる（やさしい ヒント・なんども OK） */
peekBtn.addEventListener('click', ()=>{
  if(phase!=='input') return;
  Sfx.tap();
  replayCurrent();
});
let peeking = false;
async function replayCurrent(){
  if(peeking) return;                 // のぞき なおしの れんだ ぼうし
  peeking = true;
  const my = runId;
  acceptInput = false; dial.classList.add('locked');
  peekBtn.classList.remove('show');
  hint.textContent = 'もういちど みてね 👀'; hint.className='hint watch';
  await wait(420);
  const dur = Math.max(340, 560 - seq.length*12);
  for(const i of seq){
    if(my !== runId || phase!=='input'){ peeking=false; return; }
    await light(i, dur);
    if(my !== runId || phase!=='input'){ peeking=false; return; }
    await wait(160);
  }
  peeking = false;
  if(my !== runId || phase!=='input') return;
  hint.textContent = 'おなじ じゅんばんで まねっこ！'; hint.className='hint your';
  acceptInput = true; dial.classList.remove('locked'); peekBtn.classList.add('show');
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
