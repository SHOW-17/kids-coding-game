<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>くまさんプログラミング</title>
<meta name="description" content="やじるしをならべて くまさんを ゴールへ。よめなくても あそべる プログラミングゲーム。">
<meta name="theme-color" content="#ffb43d">
<!-- ファビコン / ホーム画面アイコン -->
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<!-- iOS ホーム画面（フルスクリーン表示） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="くまプロ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff7e8; --grass:#a8d672; --grass-d:#8cc153;
    --honey:#ffb43d; --honey-d:#f59312; --brown:#8a5a3c; --ink:#5a3a22;
    --pink:#ff8fab; --blue:#5cc8e8; --green:#5fcf80; --purple:#b58cff;
    --cell:64px; --gap:8px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'M PLUS Rounded 1c',sans-serif;
    background:
      radial-gradient(circle at 20% 0%, #fff3d6 0%, transparent 50%),
      radial-gradient(circle at 90% 10%, #ffe6c0 0%, transparent 45%),
      var(--cream);
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;padding:14px 12px 28px;overflow-x:hidden;user-select:none;
  }
  h1{font-family:'Mochiy Pop One',sans-serif;font-size:clamp(22px,6vw,30px);margin:4px 0 2px;
     color:var(--brown);text-shadow:2px 3px 0 #fff,4px 6px 0 rgba(138,90,60,.15);letter-spacing:.5px;}
  .sub{font-size:13px;color:#b08c5e;margin-bottom:10px;font-weight:700;text-align:center;}
  .levelbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#fff;
    padding:6px 8px 6px 14px;border-radius:999px;
    box-shadow:0 4px 0 #ecd9b5,0 8px 18px rgba(180,140,80,.18);font-weight:800;}
  .levelbar .lv{font-family:'Mochiy Pop One';color:var(--honey-d);font-size:18px;}
  .stars{font-size:15px;letter-spacing:1px;}
  .reset{border:none;background:#f3e2c2;color:#a87b4a;font-weight:800;border-radius:999px;
    padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;}
  .reset:active{transform:translateY(1px);}
  .home{border:none;background:#ffe7bd;color:#b67a2a;font-weight:800;border-radius:999px;
    width:44px;height:44px;min-width:44px;font-size:22px;cursor:pointer;font-family:inherit;
    text-decoration:none;box-shadow:0 3px 0 #ecd9b5;display:flex;align-items:center;justify-content:center;}
  .home:active{transform:translateY(2px);box-shadow:0 1px 0 #ecd9b5;}

  #stage{position:relative;}
  #board{position:relative;display:grid;gap:var(--gap);padding:12px;
    background:linear-gradient(160deg,#6fb13f,#5d9a33);border-radius:24px;
    box-shadow:inset 0 3px 0 rgba(255,255,255,.3),0 8px 0 #4d8129,0 16px 26px rgba(80,110,40,.3);}
  .cell{width:var(--cell);height:var(--cell);border-radius:14px;background:var(--grass);
    box-shadow:inset 0 -4px 0 var(--grass-d),inset 0 2px 0 rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell)*.55);position:relative;}
  .cell.alt{background:#9fce67;box-shadow:inset 0 -4px 0 #84b84e,inset 0 2px 0 rgba(255,255,255,.25);}
  .cell.wall{background:linear-gradient(160deg,#b8bfc7,#8d97a1);
    box-shadow:inset 0 -5px 0 #727c87,inset 0 2px 0 rgba(255,255,255,.4);}
  .goalmark{font-size:calc(var(--cell)*.6);filter:drop-shadow(0 3px 2px rgba(0,0,0,.2));animation:bob 1.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .paw{position:absolute;font-size:calc(var(--cell)*.36);opacity:0;pointer-events:none;
    z-index:1;animation:pawin .3s ease forwards;}
  @keyframes pawin{to{opacity:.3}}
  .cell.bonk{animation:bonk .42s ease;box-shadow:inset 0 0 0 4px #ff4d4d,inset 0 -5px 0 #727c87 !important;}
  @keyframes bonk{0%,100%{filter:none}25%,70%{filter:brightness(1.18) saturate(1.5)}}
  .item{font-size:calc(var(--cell)*.5);filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
    animation:bob 1.4s ease-in-out infinite;transition:transform .3s,opacity .3s;}
  .item.got{transform:scale(1.6);opacity:0;}
  .cell.gate{background:linear-gradient(160deg,#caa06e,#a9763f);
    box-shadow:inset 0 -5px 0 #8a5a2c,inset 0 2px 0 rgba(255,255,255,.3);}
  .cell.gate.gateopen{background:var(--grass);box-shadow:inset 0 -4px 0 var(--grass-d),inset 0 2px 0 rgba(255,255,255,.25);}
  .switchmark{font-size:calc(var(--cell)*.5);filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));}
  .warpmark{font-size:calc(var(--cell)*.55);filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
    animation:spin 2.4s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .target{font-size:calc(var(--cell)*.55);opacity:.9;animation:bob 1.6s ease-in-out infinite;}
  .boxtok{position:absolute;left:0;top:0;display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cell)*.6);transition:transform .3s cubic-bezier(.34,1.4,.5,1);z-index:4;
    pointer-events:none;filter:drop-shadow(0 4px 3px rgba(0,0,0,.25));}
  .boxtok.on{filter:drop-shadow(0 0 7px #5fcf80) drop-shadow(0 3px 2px rgba(0,0,0,.25));}

  #bear{position:absolute;left:12px;top:12px;width:var(--cell);height:var(--cell);
    display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell)*.68);
    transition:transform .32s cubic-bezier(.34,1.4,.5,1);z-index:5;pointer-events:none;
    filter:drop-shadow(0 4px 3px rgba(0,0,0,.25));}
  #bear.hop{animation:hop .32s ease;}
  @keyframes hop{50%{transform:translate(var(--bx),calc(var(--by) - 14px)) scale(1.08)}}
  #bear.sad{animation:shake .4s ease;}
  @keyframes shake{20%{margin-left:-6px}40%{margin-left:6px}60%{margin-left:-5px}80%{margin-left:5px}}

  .label{font-weight:800;color:#a87b4a;margin:14px 0 4px;font-size:14px;align-self:flex-start;padding-left:6px;}
  #program{width:100%;max-width:460px;min-height:62px;max-height:32vh;overflow-y:auto;
    scroll-behavior:smooth;background:#fff;border-radius:18px;
    border:3px dashed #f0d6a6;padding:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
    box-shadow:0 4px 0 #ecd9b5;}
  #program .empty{color:#cdb487;font-weight:700;font-size:14px;margin:auto;}
  .budget{display:none;align-self:flex-start;margin:0 0 6px 6px;font-weight:800;font-size:14px;
    color:#7a4fd0;background:#f3ecff;border:2px solid #d9c6ff;border-radius:999px;padding:4px 12px;}
  .budget.none{color:#d35;background:#ffe3e3;border-color:#ffc2c2;}
  .chip{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:24px;color:#fff;font-weight:800;box-shadow:0 3px 0 rgba(0,0,0,.18);animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1)}}
  .chip.sm{width:34px;height:34px;font-size:19px;border-radius:10px;}
  .chip.up{background:var(--green);}.chip.down{background:var(--blue);}
  .chip.left{background:var(--purple);}.chip.right{background:var(--pink);}
  .chip.run{outline:4px solid #ffd34d;outline-offset:2px;transform:scale(1.14);}
  .chip.jmp{box-shadow:0 3px 0 rgba(0,0,0,.18),0 0 0 3px #fff,0 0 0 6px rgba(255,170,40,.5);position:relative;}
  .chip.jmp sup{font-size:11px;font-weight:800;margin-left:1px;}
  .loopbox{display:inline-flex;align-items:center;gap:6px;padding:6px;border-radius:14px;
    background:#f3ecff;border:3px solid var(--purple);box-shadow:0 3px 0 rgba(0,0,0,.12);animation:pop .2s ease;}
  .loopbox.active{border-style:dashed;box-shadow:0 0 0 4px #ffe08a;}
  .loopbox .lhead{display:flex;align-items:center;font-weight:800;color:#7a4fd0;background:#fff;
    border-radius:10px;padding:5px 9px;font-size:16px;cursor:pointer;white-space:nowrap;}
  .loopbox .lbody{display:flex;gap:4px;align-items:center;}
  .loopbox .empty2{color:#c3a9ee;font-size:12px;font-weight:700;padding:0 4px;}

  #pad{display:grid;gap:10px;width:100%;max-width:460px;margin-top:12px;}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;color:#fff;border-radius:18px;
    padding:16px 0;font-size:30px;box-shadow:0 6px 0 rgba(0,0,0,.18);transition:transform .08s,box-shadow .08s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .btn:disabled{opacity:.5;}
  .btn.up{background:var(--green);}.btn.down{background:var(--blue);}
  .btn.left{background:var(--purple);}.btn.right{background:var(--pink);}
  .btn .cap{display:block;font-size:11px;margin-top:2px;letter-spacing:1px;}

  #loopRow{display:none;width:100%;max-width:460px;margin-top:10px;}
  #loopBtn{flex:1;border:none;cursor:pointer;font-family:'Mochiy Pop One';color:#fff;font-size:18px;
    padding:14px 0;border-radius:16px;background:linear-gradient(120deg,#b58cff,#8a5cff);
    box-shadow:0 5px 0 #6f43e0;transition:transform .08s,box-shadow .08s;}
  #loopBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #6f43e0;}
  #loopBtn.on{background:linear-gradient(120deg,#ffb43d,#f59312);box-shadow:0 5px 0 #c9740c;}
  #loopBtn:disabled{opacity:.5;}

  #jumpRow{display:none;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:460px;margin-top:10px;}
  .jbtn{border:none;cursor:pointer;font-family:inherit;font-weight:800;color:#fff;border-radius:14px;
    padding:11px 0;font-size:22px;background:linear-gradient(120deg,#ff9e3d,#f5731a);
    box-shadow:0 5px 0 #c9560c;transition:transform .08s,box-shadow .08s;position:relative;}
  .jbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #c9560c;}
  .jbtn:disabled{opacity:.5;}
  .jbtn .cap{display:block;font-size:10px;margin-top:1px;letter-spacing:.5px;}
  .jbtn sup{font-size:11px;}

  #controls{display:flex;gap:10px;width:100%;max-width:460px;margin-top:10px;}
  .ctrl{flex:1;border:none;cursor:pointer;font-family:'Mochiy Pop One',sans-serif;border-radius:16px;
    padding:14px 0;font-size:16px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18);transition:transform .08s,box-shadow .08s;}
  .ctrl:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .ctrl.back{background:#f0a93c;flex:.7;}.ctrl.clear{background:#e08a8a;flex:.7;}
  .ctrl.play{background:#5fcf80;flex:1.6;font-size:20px;}
  .ctrl:disabled{opacity:.45;}

  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(90,58,34,.4);backdrop-filter:blur(2px);z-index:50;padding:20px;}
  #overlay.show{display:flex;}
  .card{background:#fff;border-radius:28px;padding:26px 30px;text-align:center;
    box-shadow:0 12px 0 #e9b94a,0 22px 40px rgba(0,0,0,.3);animation:cardin .4s cubic-bezier(.34,1.5,.5,1);max-width:300px;}
  @keyframes cardin{from{transform:scale(.5) translateY(30px);opacity:0}}
  .card .big{font-size:64px;line-height:1;}
  .card h2{font-family:'Mochiy Pop One';color:var(--honey-d);margin:10px 0 4px;font-size:24px;}
  .card p{color:#a87b4a;font-weight:700;margin:0 0 16px;font-size:15px;}
  .card .next{border:none;cursor:pointer;font-family:'Mochiy Pop One';background:var(--green);color:#fff;
    font-size:20px;padding:12px 28px;border-radius:16px;box-shadow:0 5px 0 #3da75c;}
  .card .next:active{transform:translateY(3px);box-shadow:0 2px 0 #3da75c;}
  .confetti{position:fixed;top:-20px;width:12px;height:12px;z-index:60;pointer-events:none;border-radius:3px;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:1}}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#fff;color:var(--brown);
    font-weight:800;padding:12px 22px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.2);z-index:40;
    font-size:15px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
  <h1>🐻 くまさんプログラミング</h1>
  <div class="sub">めいれいを ならべて くまさんを はちみつまで はこぼう！</div>

  <div class="levelbar">
    <a class="home" href="index.html" aria-label="もどる" title="もどる">🏠</a>
    <span class="lv" id="lvText">レベル 1</span>
    <span class="stars" id="stars"></span>
    <button class="reset" id="resetBtn">🔄 さいしょ</button>
  </div>

  <div id="stage"><div id="board"></div><div id="bear">🐻</div></div>

  <div class="label">▼ くまさんへの めいれい</div>
  <div id="budgetPill" class="budget"></div>
  <div id="program"><span class="empty">ここに めいれいが ならぶよ</span></div>

  <div id="pad"></div>
  <div id="loopRow"><button id="loopBtn">🔁 くりかえし</button></div>
  <div id="jumpRow"></div>

  <div id="controls">
    <button class="ctrl back"  id="backBtn">↩ もどす</button>
    <button class="ctrl clear" id="clearBtn">🗑 けす</button>
    <button class="ctrl play"  id="playBtn">▶ スタート！</button>
  </div>

  <div id="overlay"><div class="card">
    <div class="big" id="cardEmoji">🎉</div>
    <h2 id="cardTitle">やったね！</h2>
    <p id="cardMsg">くまさん だいまんぞく！</p>
    <button class="next" id="cardBtn">つぎへ ➡</button>
  </div></div>

  <div class="toast" id="toast"></div>

<script>
const LEVELS = [
  {w:4,h:3, start:{x:0,y:1}, goal:{x:3,y:1}, walls:[]},
  {w:4,h:4, start:{x:0,y:3}, goal:{x:3,y:0}, walls:[]},
  {w:5,h:4, start:{x:0,y:3}, goal:{x:4,y:3}, walls:[{x:2,y:3}]},
  {w:5,h:5, start:{x:0,y:4}, goal:{x:4,y:0}, walls:[{x:2,y:2},{x:2,y:3}]},
  {w:6,h:3, start:{x:0,y:1}, goal:{x:5,y:1}, walls:[], budget:3},
  {w:6,h:6, start:{x:0,y:5}, goal:{x:5,y:0}, walls:[{x:1,y:4},{x:2,y:4},{x:3,y:2},{x:4,y:2},{x:2,y:0}], budget:7},
  {w:7,h:3, start:{x:0,y:1}, goal:{x:6,y:1}, walls:[{x:3,y:0},{x:3,y:1},{x:3,y:2}]},
  {w:8,h:3, start:{x:0,y:1}, goal:{x:7,y:1}, walls:[{x:2,y:0},{x:2,y:1},{x:2,y:2},{x:5,y:0},{x:5,y:1},{x:5,y:2}]},
  {w:8,h:5, start:{x:0,y:4}, goal:{x:7,y:0}, walls:[{x:4,y:0},{x:4,y:1},{x:4,y:2},{x:4,y:3},{x:4,y:4}], budget:8},
  {w:8,h:7, start:{x:0,y:6}, goal:{x:7,y:0}, walls:[{x:2,y:0},{x:2,y:1},{x:2,y:2},{x:2,y:3},{x:2,y:4},{x:2,y:5},{x:2,y:6},{x:5,y:0},{x:5,y:1},{x:5,y:2},{x:5,y:3},{x:5,y:4},{x:5,y:5},{x:5,y:6}], budget:8},
  // L11: いちご収集 入門（より道してひろう）
  {w:5,h:3, start:{x:0,y:1}, goal:{x:4,y:1}, walls:[], items:[{x:2,y:0}]},
  // L12: いちご2つを ぐるっと まわって ひろう（コの字）
  {w:6,h:4, start:{x:0,y:3}, goal:{x:0,y:0}, walls:[], items:[{x:5,y:3},{x:5,y:0}]},
  // L13: ボタン＆とびら 入門
  {w:6,h:3, start:{x:0,y:1}, goal:{x:5,y:1}, walls:[], gates:[{x:3,y:0},{x:3,y:1},{x:3,y:2}], switches:[{x:2,y:0}]},
  // L14: ボタンは ゴールと はんたいがわ（より道して おす）
  {w:6,h:4, start:{x:0,y:3}, goal:{x:5,y:3}, walls:[], gates:[{x:3,y:0},{x:3,y:1},{x:3,y:2},{x:3,y:3}], switches:[{x:1,y:0}]},
  // L15: ワープ 入門（かべを ワープで こえる）
  {w:6,h:3, start:{x:0,y:1}, goal:{x:5,y:1}, walls:[{x:3,y:0},{x:3,y:1},{x:3,y:2}], warps:[{a:{x:2,y:1}, b:{x:4,y:1}}]},
  // L16: ワープ＋登り（ぜんぶ入り）
  {w:6,h:4, start:{x:0,y:3}, goal:{x:5,y:0}, walls:[{x:2,y:0},{x:2,y:1},{x:2,y:2},{x:2,y:3}], warps:[{a:{x:1,y:0}, b:{x:4,y:3}}]},
  // L17: はこおし 入門（みぎへ おす）
  {w:5,h:3, start:{x:0,y:1}, walls:[], boxes:[{x:2,y:1}], targets:[{x:3,y:1}]},
  // L18: うえへ おす（2マスぶん）
  {w:3,h:5, start:{x:1,y:4}, walls:[], boxes:[{x:1,y:2}], targets:[{x:1,y:0}]},
  // L19: はこ2つ（まわりこんで おす）
  {w:6,h:3, start:{x:0,y:1}, walls:[], boxes:[{x:1,y:1},{x:4,y:1}], targets:[{x:2,y:1},{x:5,y:1}]},
];
const UNLOCKS = {right:1, up:2, down:3, left:3, loop:5, jump:7};
const INTRO = {
  2:'あたらしい！ ⬆うえ にも すすめるよ',
  3:'あたらしい！ ⬇した と ⬅ひだり も つかえるよ',
  5:'🔁あたらしい！ ブロックが すくないよ。「くりかえし」で おなじうごきを まとめよう！',
  7:'🦘あたらしい！「ジャンプ」で かべを とびこえられるよ！（2マス すすむ）',
  9:'さいごの ちょうせん！🔁くりかえし と 🦘ジャンプ を じょうずに つかおう！',
  11:'🍓あたらしい！ いちごを ぜんぶ ひろってから はちみつへ いこう！',
  13:'🔘あたらしい！ ボタンを ふむと とびらが ひらくよ！',
  15:'🌀あたらしい！ うずまきに はいると もう ひとつの うずまきへ ワープ！',
  17:'📦あたらしい！ はこに むかって すすむと おせるよ。ぜんぶ 🎯に のせよう！',
};
const DIRS = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
const ARROW = {up:'⬆', down:'⬇', left:'⬅', right:'➡'};
const DIRDEF = [
  {dir:'up',label:'うえ',arrow:'⬆',cls:'up'},
  {dir:'down',label:'した',arrow:'⬇',cls:'down'},
  {dir:'left',label:'ひだり',arrow:'⬅',cls:'left'},
  {dir:'right',label:'みぎ',arrow:'➡',cls:'right'},
];
const KEY = 'kuma_prog_save_v1';

let lvIndex = 0;
let program = [];      // {kind:'move',dir} | {kind:'loop',count,body:[{dir}]}
let activeLoop = null;
let running = false;
let cleared = new Set();
let announced = new Set();
let collected = new Set();   // ひろった いちごの "x,y"
let gatesOpen = false;       // ボタンで とびらが ひらいたか
let boxPos = [];             // いまの はこの いち [{x,y}]
let boxEls = [];             // はこの DOM トークン

const $ = id => document.getElementById(id);
const board = $('board'), bear = $('bear');
const wait = ms => new Promise(r=>setTimeout(r,ms));

/* ---- save / load ---- */
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(
    {cleared:[...cleared], current:lvIndex, announced:[...announced]})); }catch(e){}
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(KEY));
    if(d){
      cleared = new Set(d.cleared||[]);
      announced = new Set(d.announced||[]);
      lvIndex = Math.min(Math.max(d.current||0,0), LEVELS.length-1);
    }
  }catch(e){}
}
function resetSave(){
  let ok=true; try{ ok = window.confirm('さいしょから やりなおす？'); }catch(e){ ok=false; }
  if(!ok) return;
  cleared=new Set(); announced=new Set(); lvIndex=0; program=[]; activeLoop=null;
  try{ localStorage.removeItem(KEY); }catch(e){}
  renderProgram(); buildLevel();
}

/* ---- board ---- */
function cellSize(w){
  const avail = Math.min(window.innerWidth - 36, 460) - 24, gap = 8;
  let c = Math.floor((avail - gap*(w-1)) / w);
  return Math.max(40, Math.min(c, 84));
}
function isWall(L,x,y){ return L.walls.some(p=>p.x===x&&p.y===y); }
function footprint(x,y){
  const L=LEVELS[lvIndex];
  if(L.goal.x===x && L.goal.y===y) return;
  const cell=board.children[y*L.w+x];
  if(!cell || cell.querySelector('.paw')) return;
  const s=document.createElement('span'); s.className='paw'; s.textContent='🐾'; cell.appendChild(s);
}
function clearPaws(){ board.querySelectorAll('.paw').forEach(s=>s.remove()); }
function gateAt(L,x,y){ return (L.gates||[]).some(p=>p.x===x&&p.y===y); }
function switchAt(L,x,y){ return (L.switches||[]).some(p=>p.x===x&&p.y===y); }
function itemAt(L,x,y){ return (L.items||[]).some(p=>p.x===x&&p.y===y); }
function warpAt(L,x,y){
  for(const w of (L.warps||[])){
    if(w.a.x===x&&w.a.y===y) return w.b;
    if(w.b.x===x&&w.b.y===y) return w.a;
  }
  return null;
}
function blocked(L,x,y){ return isWall(L,x,y) || (gateAt(L,x,y) && !gatesOpen); }
function openGatesVisual(L){
  (L.gates||[]).forEach(g=>{ const c=board.children[g.y*L.w+g.x]; if(c){ c.classList.add('gateopen'); c.textContent=''; } });
}
function restoreLevelTokens(L){
  board.querySelectorAll('.item.got').forEach(s=>s.classList.remove('got'));
  (L.gates||[]).forEach(g=>{ const c=board.children[g.y*L.w+g.x]; if(c){ c.classList.remove('gateopen'); c.textContent='🚪'; } });
}
function collectItem(L,x,y){
  if(!itemAt(L,x,y)) return;
  const key=x+','+y; if(collected.has(key)) return;
  collected.add(key);
  const c=board.children[y*L.w+x], s=c&&c.querySelector('.item');
  if(s) s.classList.add('got');
  beep(1175,0.12,'triangle');
}
function pressSwitch(L,x,y){
  if(!switchAt(L,x,y) || gatesOpen) return;
  gatesOpen=true; openGatesVisual(L); beep(880,0.14,'triangle'); toast('とびらが ひらいた！🚪');
}
function boxIndexAt(x,y){ return boxPos.findIndex(b=>b.x===x&&b.y===y); }
function placeBox(i,animate){
  const e=boxEls[i], b=boxPos[i]; if(!e||!b) return;
  const cs=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'));
  const gap=8,pad=12;
  e.style.width=cs+'px'; e.style.height=cs+'px';
  e.style.transition=animate?'':'none';
  e.style.transform=`translate(${pad+b.x*(cs+gap)}px,${pad+b.y*(cs+gap)}px)`;
  if(!animate) requestAnimationFrame(()=>{ e.style.transition=''; });
}
function updateBoxOn(L){
  const ts=L.targets||[];
  boxPos.forEach((b,i)=>{ if(boxEls[i]) boxEls[i].classList.toggle('on', ts.some(t=>t.x===b.x&&t.y===b.y)); });
}
function makeBoxes(L){
  boxEls.forEach(e=>e.remove()); boxEls=[];
  boxPos=(L.boxes||[]).map(b=>({x:b.x,y:b.y}));
  boxPos.forEach((b,i)=>{
    const e=document.createElement('div'); e.className='boxtok'; e.textContent='📦';
    $('stage').appendChild(e); boxEls.push(e); placeBox(i,false);
  });
  updateBoxOn(L);
}
function resetBoxes(L){
  boxPos=(L.boxes||[]).map(b=>({x:b.x,y:b.y}));
  boxEls.forEach((e,i)=>placeBox(i,false));
  updateBoxOn(L);
}
function levelCleared(L){
  if(L.boxes){ const ts=L.targets||[]; return boxPos.length>0 && boxPos.every(b=>ts.some(t=>t.x===b.x&&t.y===b.y)); }
  const atGoal = pos.x===L.goal.x && pos.y===L.goal.y;
  const allItems = (L.items||[]).every(it=>collected.has(it.x+','+it.y));
  return atGoal && allItems;
}

function buildLevel(){
  const L = LEVELS[lvIndex];
  document.documentElement.style.setProperty('--cell', cellSize(L.w)+'px');
  board.style.gridTemplateColumns = `repeat(${L.w}, var(--cell))`;
  board.innerHTML='';
  for(let y=0;y<L.h;y++) for(let x=0;x<L.w;x++){
    const c=document.createElement('div');
    c.className='cell'+(((x+y)%2)?' alt':'');
    if(isWall(L,x,y)){ c.className='cell wall'; c.textContent='🪨'; }
    else if(gateAt(L,x,y)){ c.className='cell gate'; c.textContent='🚪'; }
    if(L.goal && L.goal.x===x && L.goal.y===y){
      const g=document.createElement('span'); g.className='goalmark'; g.textContent='🍯'; c.appendChild(g);
    }
    if((L.targets||[]).some(t=>t.x===x&&t.y===y)){ const g=document.createElement('span'); g.className='target'; g.textContent='🎯'; c.appendChild(g); }
    if(switchAt(L,x,y)){ const s=document.createElement('span'); s.className='switchmark'; s.textContent='🔘'; c.appendChild(s); }
    if(itemAt(L,x,y)){ const s=document.createElement('span'); s.className='item'; s.textContent='🍓'; c.appendChild(s); }
    if(warpAt(L,x,y)){ const s=document.createElement('span'); s.className='warpmark'; s.textContent='🌀'; c.appendChild(s); }
    board.appendChild(c);
  }
  collected=new Set(); gatesOpen=false;
  pos={...L.start}; placeBear(false); makeBoxes(L);
  $('lvText').textContent='レベル '+(lvIndex+1);
  renderStars(); renderPad(); renderBudget();
  const num=lvIndex+1;
  if(INTRO[num] && !announced.has(num)){
    announced.add(num); save();
    showCard({emoji:'✨',title:'レベルアップ！',msg:INTRO[num],btn:'やってみる！',onBtn:hideCard});
  }
}

let pos={x:0,y:0};
function placeBear(animate){
  const cs=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'));
  const gap=8,pad=12, bx=pad+pos.x*(cs+gap), by=pad+pos.y*(cs+gap);
  bear.style.setProperty('--bx',bx+'px'); bear.style.setProperty('--by',by+'px');
  bear.style.width=cs+'px'; bear.style.height=cs+'px';
  bear.style.transition= animate?'':'none';
  bear.style.transform=`translate(${bx}px,${by}px)`;
  if(!animate) requestAnimationFrame(()=>{ bear.style.transition=''; });
}

/* ---- command pad (progressive unlock) ---- */
function renderPad(){
  const num=lvIndex+1;
  const dirs=DIRDEF.filter(d=>UNLOCKS[d.dir]<=num);
  const pad=$('pad');
  pad.style.gridTemplateColumns=`repeat(${dirs.length},1fr)`;
  pad.innerHTML=dirs.map(d=>
    `<button class="btn ${d.cls}" data-dir="${d.dir}">${d.arrow}<span class="cap">${d.label}</span></button>`).join('');
  pad.querySelectorAll('.btn').forEach(b=>b.addEventListener('click',()=>addMove(b.dataset.dir,false)));
  $('loopRow').style.display = (UNLOCKS.loop<=num)?'flex':'none';
  const jrow=$('jumpRow');
  if(UNLOCKS.jump<=num){
    jrow.style.display='grid';
    jrow.innerHTML=DIRDEF.map(d=>
      `<button class="jbtn" data-dir="${d.dir}">${d.arrow}<sup>2</sup><span class="cap">ジャンプ</span></button>`).join('');
    jrow.querySelectorAll('.jbtn').forEach(b=>b.addEventListener('click',()=>addMove(b.dataset.dir,true)));
  } else jrow.style.display='none';
  updateLoopBtn();
}

/* ---- program building ---- */
function addMove(dir, jump){
  if(running) return;
  const L=LEVELS[lvIndex];
  if(L.budget!=null && usedBlocks()+1 > L.budget){ toast('ブロックが たりない！🔁くりかえし で まとめよう'); return; }
  if(activeLoop!==null){
    if(program[activeLoop].body.length>=8) return;
    program[activeLoop].body.push({dir,jump});
  } else {
    if(program.length>=16) return;
    program.push({kind:'move',dir,jump});
  }
  renderProgram(); beep(jump?700:520,0.05);
}
function usedBlocks(){
  return program.reduce((n,it)=> n + (it.kind==='move'?1:1+it.body.length), 0);
}
function toggleLoop(){
  if(running) return;
  if(activeLoop!==null){
    if(program[activeLoop].body.length===0) program.splice(activeLoop,1);
    activeLoop=null;
  } else {
    const L=LEVELS[lvIndex];
    if(L.budget!=null && usedBlocks()+1 > L.budget){ toast('ブロックが たりないよ！'); return; }
    program.push({kind:'loop',count:2,body:[]});
    activeLoop=program.length-1;
  }
  renderProgram(); beep(640,0.05);
}
function undo(){
  if(running) return;
  if(activeLoop!==null){
    const lp=program[activeLoop];
    if(lp.body.length>0) lp.body.pop();
    else { program.splice(activeLoop,1); activeLoop=null; }
  } else program.pop();
  renderProgram();
}
function clearP(){ if(running) return; program=[]; activeLoop=null; renderProgram(); }

function renderProgram(){
  const p=$('program');
  if(program.length===0){ p.innerHTML='<span class="empty">ここに めいれいが ならぶよ</span>'; updateLoopBtn(); renderBudget(); return; }
  p.innerHTML='';
  program.forEach((item,pi)=>{
    if(item.kind==='move'){
      const chip=document.createElement('div');
      chip.className='chip '+item.dir+(item.jump?' jmp':'');
      chip.innerHTML=ARROW[item.dir]+(item.jump?'<sup>2</sup>':'');
      chip.dataset.pi=pi; chip.dataset.t='m'; p.appendChild(chip);
    } else {
      const box=document.createElement('div');
      box.className='loopbox'+(activeLoop===pi?' active':''); box.dataset.pi=pi;
      const head=document.createElement('div'); head.className='lhead'; head.textContent='🔁 ×'+item.count;
      head.addEventListener('click',()=>{ if(running) return; item.count=item.count>=8?2:item.count+1; renderProgram(); beep(600,0.04); });
      const body=document.createElement('div'); body.className='lbody';
      if(item.body.length===0){ const e=document.createElement('span'); e.className='empty2'; e.textContent='やじるしを いれてね'; body.appendChild(e); }
      item.body.forEach((b,bi)=>{
        const c=document.createElement('div'); c.className='chip sm '+b.dir+(b.jump?' jmp':'');
        c.innerHTML=ARROW[b.dir]+(b.jump?'<sup>2</sup>':'');
        c.dataset.pi=pi; c.dataset.bi=bi; body.appendChild(c);
      });
      box.appendChild(head); box.appendChild(body); p.appendChild(box);
    }
  });
  updateLoopBtn();
  renderBudget();
}
function renderBudget(){
  const pill=$('budgetPill'); if(!pill) return;
  const L=LEVELS[lvIndex];
  if(L.budget==null){ pill.style.display='none'; return; }
  const left=L.budget-usedBlocks();
  pill.style.display='inline-block';
  pill.textContent='🧱 ブロック のこり '+left+' こ';
  pill.classList.toggle('none', left<=0);
}
function updateLoopBtn(){
  const b=$('loopBtn'); if(!b) return;
  if(activeLoop!==null){ b.textContent='✓ とじる'; b.classList.add('on'); }
  else { b.textContent='🔁 くりかえし'; b.classList.remove('on'); }
}

function renderStars(){
  let s=''; for(let i=0;i<LEVELS.length;i++) s+= cleared.has(i)?'⭐':'·';
  $('stars').textContent=s;
}

/* ---- sound ---- */
let actx;
function beep(freq,dur,type='sine'){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
    g.gain.setValueAtTime(0.12,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function winSound(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle'),i*120)); }

/* ---- run ---- */
async function run(){
  if(running) return;
  if(activeLoop!==null){ if(program[activeLoop].body.length===0) program.splice(activeLoop,1); activeLoop=null; renderProgram(); }
  const p=$('program'), flat=[];
  program.forEach((item,pi)=>{
    if(item.kind==='move'){ flat.push({dir:item.dir, jump:item.jump, el:p.querySelector(`[data-pi="${pi}"][data-t="m"]`)}); }
    else { for(let r=0;r<item.count;r++) item.body.forEach((b,bi)=>{ flat.push({dir:b.dir, jump:b.jump, el:p.querySelector(`[data-pi="${pi}"][data-bi="${bi}"]`)}); }); }
  });
  if(flat.length===0){ toast('やじるしを いれてね！'); return; }

  running=true; setButtons(true);
  const L=LEVELS[lvIndex];
  collected=new Set(); gatesOpen=false; restoreLevelTokens(L); resetBoxes(L);
  pos={...L.start}; placeBear(false); clearPaws(); footprint(pos.x,pos.y); await wait(150);

  for(let i=0;i<flat.length;i++){
    p.querySelectorAll('.chip').forEach(c=>c.classList.remove('run'));
    if(flat[i].el){ flat[i].el.classList.add('run');
      flat[i].el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'nearest'}); }
    const d=DIRS[flat[i].dir], step=flat[i].jump?2:1;
    const nx=pos.x+d.x*step, ny=pos.y+d.y*step;
    const bi=boxIndexAt(nx,ny); let pushTo=null, bump=false;
    if(nx<0||ny<0||nx>=L.w||ny>=L.h||blocked(L,nx,ny)) bump=true;
    else if(bi>=0){
      const px=nx+d.x, py=ny+d.y;
      if(px<0||py<0||px>=L.w||py>=L.h||blocked(L,px,py)||boxIndexAt(px,py)>=0) bump=true;
      else pushTo={x:px,y:py};
    }
    if(bump){
      bear.classList.add('sad'); beep(160,0.25,'square');
      let bonkCell=null;
      if(nx>=0&&ny>=0&&nx<L.w&&ny<L.h&&blocked(L,nx,ny)){
        bonkCell=board.children[ny*L.w+nx];
        if(bonkCell) bonkCell.classList.add('bonk');
        await wait(120);
      }
      toast('あれ！ ぶつかっちゃった。スタートに もどるよ');
      await wait(500); bear.classList.remove('sad');
      if(bonkCell) bonkCell.classList.remove('bonk');
      p.querySelectorAll('.chip').forEach(c=>c.classList.remove('run'));
      pos={...L.start}; placeBear(true); await wait(360);
      finishRun(); return;
    }
    if(bi>=0 && pushTo){ boxPos[bi]={x:pushTo.x,y:pushTo.y}; placeBox(bi,true); updateBoxOn(L); beep(300,0.06,'square'); }
    pos={x:nx,y:ny}; bear.classList.add('hop'); beep(440+i*15,0.06); placeBear(true);
    await wait(340); bear.classList.remove('hop'); footprint(nx,ny);
    pressSwitch(L,pos.x,pos.y); collectItem(L,pos.x,pos.y);
    const tgt=warpAt(L,pos.x,pos.y);
    if(tgt){
      await wait(120); beep(990,0.1,'triangle');
      pos={x:tgt.x,y:tgt.y}; placeBear(true); await wait(340); footprint(pos.x,pos.y);
      pressSwitch(L,pos.x,pos.y); collectItem(L,pos.x,pos.y);
    }
  }
  p.querySelectorAll('.chip').forEach(c=>c.classList.remove('run'));
  await wait(150);
  if(levelCleared(L)) win();
  else {
    let msg='もうすこし！ なおして もういちど';
    if(L.boxes) msg='📦を ぜんぶ 🎯に のせてね！';
    else if((L.items||[]).some(it=>!collected.has(it.x+','+it.y)) && pos.x===L.goal.x && pos.y===L.goal.y) msg='いちごが のこってるよ！🍓';
    toast(msg);
    pos={...L.start}; placeBear(true); await wait(360); finishRun();
  }
}
function finishRun(){ running=false; setButtons(false); }
function setButtons(dis){
  ['playBtn','backBtn','clearBtn','loopBtn'].forEach(id=>{const e=$(id); if(e)e.disabled=dis;});
  document.querySelectorAll('#pad .btn, #jumpRow .jbtn').forEach(b=>b.disabled=dis);
}

function win(){
  cleared.add(lvIndex); renderStars(); save(); winSound(); confetti();
  const last=lvIndex>=LEVELS.length-1;
  showCard({emoji:'🎉',title:'やったね！',
    msg:last?'ぜんぶ クリア！ きみは プログラミングはかせ だ！':'くまさん だいまんぞく！',
    btn:last?'🔄 もういちど':'つぎへ ➡', onBtn:next});
  running=false;
}
function next(){
  hideCard();
  if(lvIndex>=LEVELS.length-1){ lvIndex=0; cleared=new Set(); announced=new Set(); }
  else lvIndex++;
  program=[]; activeLoop=null; renderProgram(); setButtons(false); save(); buildLevel();
}

/* ---- card / overlay ---- */
let cardCb=null;
function showCard({emoji,title,msg,btn,onBtn}){
  $('cardEmoji').textContent=emoji; $('cardTitle').textContent=title; $('cardMsg').textContent=msg;
  $('cardBtn').textContent=btn; cardCb=onBtn; $('overlay').classList.add('show');
}
function hideCard(){ $('overlay').classList.remove('show'); }

function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700);
}
function confetti(){
  const cols=['#ffb43d','#ff8fab','#5cc8e8','#5fcf80','#b58cff','#ffd34d'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length];
    c.style.animation=`fall ${1+Math.random()*1.5}s ${Math.random()*0.4}s linear forwards`; c.style.opacity=0;
    document.body.appendChild(c); setTimeout(()=>c.remove(),3200);
  }
}

/* ---- wiring ---- */
$('backBtn').addEventListener('click',undo);
$('clearBtn').addEventListener('click',clearP);
$('playBtn').addEventListener('click',run);
$('loopBtn').addEventListener('click',toggleLoop);
$('resetBtn').addEventListener('click',resetSave);
$('cardBtn').addEventListener('click',()=>{ const cb=cardCb; cardCb=null; if(cb) cb(); });
let rsz; window.addEventListener('resize',()=>{clearTimeout(rsz);rsz=setTimeout(buildLevel,150);});

load();
buildLevel();
renderProgram();
</script>
