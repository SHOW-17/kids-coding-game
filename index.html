<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>あそびのもり</title>
<meta name="description" content="あそびながら かしこくなる。よめなくても あそべる ちいさな こどもの ゲームランド。">
<meta name="theme-color" content="#9fd16a">
<link rel="icon" href="assets/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fff7ea; --paper2:#ffeccd;
  --ink:#5b4022; --ink-soft:#7c5d39; --ink-faint:#a98c66;
  --honey:#ffb43d; --honey-d:#f59312; --honey-l:#ffdb95;
  --r:30px; --r-sm:20px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{ -webkit-text-size-adjust:100%;
  min-height:100%;
  background:#cdeab2 url("assets/menu/bg.webp") center top / cover no-repeat fixed;
}
body{
  font-family:'M PLUS Rounded 1c',sans-serif; color:var(--ink);
  position:relative; overflow-x:hidden; background:transparent;
  max-width:600px; margin:0 auto;
  padding:0 16px calc(26px + env(safe-area-inset-bottom));
}
/* readability scrim: clear sky up top, soft cream wash lower down so cards/text pop */
.scrim{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:linear-gradient(180deg,
    rgba(255,253,245,0) 0%, rgba(255,253,245,0) 22%,
    rgba(255,250,236,.28) 46%, rgba(255,247,230,.5) 74%, rgba(255,245,226,.62) 100%);}
.screen{position:relative;z-index:1;max-width:600px;margin:0 auto;}

/* ===== SETTINGS BUTTON（右上のBGM音符と同じく fixed で追従。こちらは左上） ===== */
.iconbtn{position:fixed;z-index:9999;
  top:calc(8px + env(safe-area-inset-top));
  left:calc(10px + env(safe-area-inset-left));
  border:none;background:none;cursor:pointer;padding:0;line-height:0;
  transition:transform .14s var(--ease);filter:drop-shadow(0 5px 6px rgba(80,55,15,.32));}
.iconbtn img{width:50px;height:50px;display:block;}
.iconbtn:active{transform:translateY(3px) scale(.94);}

/* ===== HERO ===== */
.hero{position:relative;text-align:center;padding-top:calc(58px + env(safe-area-inset-top));}
.logo-img{display:block;margin:0 auto;width:min(74%,392px);height:auto;
  filter:drop-shadow(0 10px 12px rgba(90,55,15,.35));}
.tagline{margin-top:2px;display:inline-flex;align-items:center;gap:7px;
  font-weight:800;font-size:14.5px;color:var(--ink-soft);
  background:rgba(255,255,255,.94); padding:7px 18px;border-radius:999px;
  box-shadow:0 5px 0 rgba(150,110,60,.18), inset 0 2px 0 #fff;}
.tagline .star{width:15px;height:15px;background:var(--honey);
  clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  box-shadow:0 1px 0 #d9913a;}

/* hero unicorns standing on the path */
.cast{position:relative;height:182px;margin-top:8px;}
.cast img{position:absolute;bottom:0;filter:drop-shadow(0 12px 8px rgba(90,55,15,.32));}
.cast .blue{height:178px;left:50%;transform:translateX(-50%);z-index:3;animation:bob 3s var(--ease) infinite;}
.cast .green{height:120px;left:6%;bottom:4px;z-index:2;animation:bobSide 3.4s var(--ease) infinite .3s;}
.cast .purple{height:122px;right:5%;bottom:2px;z-index:2;animation:bobSide 3.2s var(--ease) infinite .6s;}
.cast .pad{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:38%;max-width:170px;height:20px;border-radius:50%;background:rgba(110,80,40,.18);filter:blur(7px);}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-9px)}}
@keyframes bobSide{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@media (prefers-reduced-motion: reduce){ .cast img{animation:none!important;} }

/* ===== SECTION HEADER ===== */
.shelf-h{display:inline-flex;align-items:center;gap:9px;margin:18px auto 14px;
  font-family:'Mochiy Pop One';font-size:16px;color:var(--ink);
  background:rgba(255,255,255,.9);padding:8px 18px;border-radius:999px;
  box-shadow:0 4px 0 rgba(150,110,60,.16), inset 0 2px 0 #fff;}
.shelf-wrap{text-align:center;}
.shelf-h .dot{width:13px;height:13px;border-radius:50%;background:var(--honey);
  box-shadow:0 2px 0 #d9913a, inset 0 2px 0 rgba(255,255,255,.6);}

/* ===== CLAY CARD ===== */
.card{
  position:relative;border-radius:var(--r);background:#fffdf7;border:none;
  text-align:left;width:100%;cursor:pointer;display:block;color:inherit;font:inherit;
  box-shadow:
    0 18px 30px -14px rgba(90,55,15,.5),
    0 3px 0 rgba(120,80,30,.12),
    inset 0 3px 0 rgba(255,255,255,.95),
    inset 0 -10px 16px rgba(190,150,90,.12);
  transition:transform .16s var(--ease), box-shadow .16s var(--ease);
}
.card:active{transform:translateY(4px) scale(.985);
  box-shadow:0 9px 16px -10px rgba(90,55,15,.5),inset 0 3px 0 rgba(255,255,255,.95),inset 0 -10px 16px rgba(190,150,90,.12);}
.art{position:relative;overflow:hidden;background:#f3ead7;}
.art img.scene{width:100%;height:100%;object-fit:cover;display:block;}
.art::after{content:"";position:absolute;inset:0;
  background:radial-gradient(120% 70% at 50% 0,rgba(255,255,255,.35),transparent 60%);
  pointer-events:none;}

/* game-name banner sticker（本文先頭にブロック配置。見切れない） */
.banner{position:relative;z-index:4;display:block;height:38px;width:auto;max-width:100%;
  filter:drop-shadow(0 5px 6px rgba(60,40,10,.4));transform:rotate(-1.5deg);
  transform-origin:left center;}

.desc{font-size:12.5px;font-weight:700;color:var(--ink-soft);line-height:1.5;}
.play{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;
  font-family:'Mochiy Pop One';font-size:14.5px;color:#fff;
  background:linear-gradient(180deg,var(--ac,#ffb43d),var(--ac-d,#f59312));
  padding:9px 18px;border-radius:999px;
  box-shadow:0 5px 0 var(--ac-sh,#d9851f), inset 0 2px 0 rgba(255,255,255,.45);}
.play .tri{width:0;height:0;border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;}
.prog{display:flex;align-items:center;gap:8px;}
.prog .bar{flex:1;height:11px;border-radius:9px;background:#f0e2c6;overflow:hidden;
  box-shadow:inset 0 2px 3px rgba(150,110,60,.25);}
.prog .bar i{display:block;height:100%;border-radius:9px;
  background:linear-gradient(90deg,var(--honey-l),var(--honey));transition:width .6s var(--ease);}
.prog .pct{font-size:12px;font-weight:800;color:var(--ink-faint);min-width:40px;text-align:right;}
.tagrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.tag{font-size:11.5px;font-weight:800;color:var(--ac-d);white-space:nowrap;
  background:var(--ac-soft,#ffe9c6);padding:3px 11px;border-radius:999px;}
.best{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--ink-soft);white-space:nowrap;}
.best .star{width:12px;height:12px;background:var(--honey);
  clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.ribbon{position:absolute;top:12px;right:-4px;z-index:5;
  font-family:'Mochiy Pop One';font-size:11.5px;color:#fff;
  background:linear-gradient(180deg,#ff8a5c,#ee5f33);padding:5px 12px;
  border-radius:999px 6px 6px 999px;box-shadow:0 5px 0 #c8491f, inset 0 2px 0 rgba(255,255,255,.35);}

/* feature card: text left, scene right */
.feature{display:flex;align-items:stretch;margin-bottom:14px;overflow:hidden;min-height:182px;}
.feature .body{flex:1;min-width:0;padding:16px 12px 16px 18px;display:flex;flex-direction:column;gap:9px;justify-content:center;}
.feature .art{flex:0 0 44%;align-self:stretch;border-radius:0 var(--r) var(--r) 0;}
.feature .banner{height:40px;margin:0 0 2px -2px;}
.feature .desc{padding-right:4px;}

/* grid: scene top, text bottom */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:360px){ .grid{gap:11px;} }
.grid .card{display:flex;flex-direction:column;}
.grid .art{aspect-ratio:4/3;border-radius:var(--r) var(--r) 0 0;}
.grid .body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:7px;}
/* 看板はアート下端に少し重ねる（上にはみ出す＝本文ボックスは clip しないので見える） */
.grid .banner{height:34px;margin:-28px 0 6px -2px;transform:rotate(-2deg);}

/* entrance */
.enter{opacity:0;transform:translateY(14px);animation:rise .5s var(--ease) forwards;}
.enter.d1{animation-delay:.05s}.enter.d2{animation-delay:.12s}.enter.d3{animation-delay:.19s}
.enter.d4{animation-delay:.26s}.enter.d5{animation-delay:.33s}.enter.d6{animation-delay:.40s}
@keyframes rise{to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){ .enter{opacity:1;transform:none;animation:none;} }

/* footer */
.foot{margin-top:24px;text-align:center;}
.credit{font-size:11px;color:var(--ink-soft);font-weight:700;
  background:rgba(255,255,255,.55);display:inline-block;padding:5px 14px;border-radius:999px;}

/* ===== dialogs ===== */
.ovl{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(50,35,15,.46);backdrop-filter:blur(2px);padding:24px;}
.ovl[hidden]{display:none;}
.dlg{background:#fffdf7;border-radius:28px;max-width:340px;width:100%;padding:24px 22px;text-align:center;
  box-shadow:0 26px 50px -16px rgba(90,55,15,.6),inset 0 3px 0 rgba(255,255,255,.95);
  animation:pop .28s var(--ease);}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.dlg .ic{width:60px;height:60px;margin:0 auto 10px;}
.dlg .ic img{width:100%;height:100%;}
.dlg h2{font-family:'Mochiy Pop One';font-size:21px;color:var(--ink);margin-bottom:8px;}
.dlg p{font-size:13.5px;font-weight:700;color:var(--ink-soft);line-height:1.6;margin-bottom:18px;}
.dlg .col{display:flex;flex-direction:column;gap:10px;}
.dlg .row{display:flex;gap:10px;}
.dlg button{flex:1;font-family:'Mochiy Pop One';font-size:15px;padding:13px;border:none;border-radius:999px;cursor:pointer;}
.dlg .ghost{background:#f0e6d3;color:var(--ink-soft);box-shadow:0 4px 0 rgba(150,110,60,.18);}
.dlg .ghost:active,.dlg .danger:active,.dlg .go:active{transform:translateY(2px);}
.dlg .danger{background:linear-gradient(180deg,#ff7a8f,#ec5168);color:#fff;box-shadow:0 4px 0 #c93b50;}
.dlg .go{background:linear-gradient(180deg,var(--honey),var(--honey-d));color:#fff;box-shadow:0 4px 0 #d9851f;}
</style>
</head>
<body>
<div class="scrim" aria-hidden="true"></div>
<div class="screen">

  <button class="iconbtn enter d1" id="btnSettings" aria-label="せってい">
    <img src="assets/menu/btn_settings.webp" alt="" draggable="false">
  </button>

  <header class="hero">
    <img class="logo-img enter d1" src="assets/menu/logo.webp" alt="あそびのもり" draggable="false">
    <div class="tagline enter d2"><span class="star"></span> よめなくても あそべる！</div>
    <div class="cast enter d2">
      <div class="pad"></div>
      <img class="green"  src="assets/menu/uni_green.webp"  alt="" draggable="false">
      <img class="purple" src="assets/menu/uni_purple.webp" alt="" draggable="false">
      <img class="blue"   src="assets/menu/uni_blue.webp"   alt="" draggable="false">
    </div>
  </header>

  <div class="shelf-wrap"><div class="shelf-h enter d3"><span class="dot"></span> あそびを えらんでね</div></div>

  <div id="grid-feature"></div>
  <div class="grid" id="grid"></div>

  <div class="foot enter d6">
    <div class="credit">あそびのもり ・ こどもの ゲームランド</div>
  </div>
</div>

<!-- settings sheet -->
<div class="ovl" id="ovlSet" hidden>
  <div class="dlg">
    <div class="ic"><img src="assets/menu/btn_settings.webp" alt=""></div>
    <h2>せってい</h2>
    <p>おうちの ひとが つかう ボタンだよ。</p>
    <div class="col">
      <button class="danger" id="setReset">きろくを ぜんぶ けす</button>
      <button class="ghost" id="setClose">とじる</button>
    </div>
  </div>
</div>

<!-- reset confirm -->
<div class="ovl" id="ovl" hidden>
  <div class="dlg">
    <div class="ic"><img src="assets/menu/btn_book.webp" alt=""></div>
    <h2>ぜんぶ けす？</h2>
    <p>あそんだ きろくが ぜんぶ きえます。<br>ほんとうに けして いい？</p>
    <div class="row">
      <button class="ghost" id="ovlNo">やめる</button>
      <button class="danger" id="ovlYes">けす</button>
    </div>
  </div>
</div>

<!-- 実機リポジトリでは下記が共通基盤を読み込む。無くても画面は動作する（ガード済み） -->
<script src="assets/audio.js"></script>
<script src="assets/fx.js"></script>
<script src="assets/save.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/bgm.js"></script>
<script>
/* ===== ゲーム定義（看板・カードは画像素材を使用） ===== */
const GAMES = [
  {
    id:'kuma', feature:true, href:'games/programming.html',
    name:'プログラミング', desc:'やじるしを ならべて、<br>ゴールまで すすもう。',
    ac:'#ffb43d', acd:'#f59312', acsh:'#d9851f', acsoft:'#ffe9c6',
    ribbon:'にんき No.1', total:19,
    banner:'assets/menu/banner_programming.webp',
    scene:'assets/menu/card_programming.webp'
  },
  {
    id:'manekko', href:'games/manekko.html', ns:'manekko',
    name:'まねっこ', desc:'ひかった じゅんばんを<br>おぼえて まねっこ。',
    ac:'#9b7cf0', acd:'#7b59e0', acsh:'#5f43b8', acsoft:'#ece3ff',
    tag:'きおく力',
    progressKey:'best', bestLabel:v=>v>0?('さいこう '+v+'だん'):null,
    banner:'assets/menu/banner_manekko.webp',
    scene:'assets/menu/card_manekko.webp'
  },
  {
    id:'kimari', href:'games/kimari.html', ns:'kimari',
    name:'きまり', desc:'ならびの つぎは なに？<br>きまりを みつけよう。',
    ac:'#2fa6cc', acd:'#2189ad', acsh:'#1a6c8a', acsoft:'#d7f1fb',
    tag:'すいり力',
    progressKey:'best', bestLabel:v=>v>0?('れんぞく '+v+'もん'):null,
    banner:'assets/menu/banner_kimari.webp',
    scene:'assets/menu/card_kimari.webp'
  },
  {
    id:'katachi', href:'games/katachi.html', ns:'katachi',
    name:'かたち', desc:'ピースを ならべて<br>おてほんを つくろう。',
    ac:'#389355', acd:'#389355', acsh:'#2c7544', acsoft:'#dcf3e3',
    tag:'かたち力',
    progressKey:'cleared', bestLabel:v=>v>0?(v+'こ かんせい'):null,
    banner:'assets/menu/banner_katachi.webp',
    scene:'assets/menu/card_katachi.webp'
  },
  {
    id:'pitagora', href:'games/pitagora.html', ns:'pitagora',
    name:'ぴたごら', desc:'どうぐを おいて<br>たまを ゴールへ。',
    ac:'#e57e1c', acd:'#c96a12', acsh:'#a4540b', acsoft:'#ffe6cb',
    tag:'くふう力',
    progressKey:'cleared', bestLabel:v=>v>0?(v+'こ クリア'):null,
    banner:'assets/menu/banner_pitagora.webp',
    scene:'assets/menu/card_pitagora.webp'
  }
];

/* くまゲームの進捗（独自キー）。重複混入でも水増ししないよう一意化して数える */
function kumaCleared(){
  try{
    const d = JSON.parse(localStorage.getItem('kuma_prog_save_v1'));
    if(!d || !Array.isArray(d.cleared)) return 0;
    return new Set(d.cleared).size;
  }catch(e){ return 0; }
}
/* クリアした いちばん たかい レベル（自由移動で とびとびクリアも あるため） */
function kumaBestLevel(){
  try{
    const d = JSON.parse(localStorage.getItem('kuma_prog_save_v1'));
    if(!d || !Array.isArray(d.cleared) || !d.cleared.length) return 0;
    const ns = d.cleared.map(Number).filter(n=>!isNaN(n));
    return ns.length ? Math.max(...ns)+1 : 0;
  }catch(e){ return 0; }
}
/* 各ゲームの進捗値（Save が無い環境では 0） */
function progressOf(g){
  if(!g.ns) return 0;
  try{ if(window.Save && Save.game) return Save.game(g.ns).get(g.progressKey,0); }catch(e){}
  try{ return JSON.parse(localStorage.getItem('save_'+g.ns)||'{}')[g.progressKey]||0; }catch(e){}
  return 0;
}

function navTo(href, g, ev){
  try{ if(window.Sfx&&Sfx.pop) Sfx.pop(); }catch(e){}
  try{
    if(window.FX&&FX.ring){ const t=ev.currentTarget.getBoundingClientRect();
      FX.ring(t.left+t.width/2, t.top+t.height/2, {color:g.ac, vr:7, life:24}); }
  }catch(e){}
  if(window.App&&App.go){ try{ App.go(href); return; }catch(e){} }
  setTimeout(()=>{ location.href = href; }, 110);
}

function makeCard(g, i){
  const card = document.createElement('button');
  card.className = 'card enter d'+Math.min(i+2,6) + (g.feature?' feature':'');
  card.setAttribute('aria-label', g.name+' で あそぶ');
  card.style.setProperty('--ac', g.ac);
  card.style.setProperty('--ac-d', g.acd);
  card.style.setProperty('--ac-sh', g.acsh);
  card.style.setProperty('--ac-soft', g.acsoft);

  // 進捗 / メタ
  let meta = '';
  if(g.feature && g.total){
    const done = Math.min(kumaCleared(), g.total);
    const pct = Math.round(done/g.total*100);
    const bl = Math.min(kumaBestLevel(), g.total);
    meta = `<div class="prog" role="img" aria-label="${done} / ${g.total} クリア">
              <div class="bar"><i style="width:${pct}%"></i></div>
              <span class="pct">${done}/${g.total}</span></div>` +
           (bl>0 ? `<div class="tagrow"><span class="best"><span class="star"></span>さいこう レベル${bl}</span></div>` : '');
  } else if(g.tag){
    const v = progressOf(g);
    const label = g.bestLabel ? g.bestLabel(v) : null;
    meta = `<div class="tagrow"><span class="tag">${g.tag}</span>` +
           (label ? `<span class="best"><span class="star"></span>${label}</span>` : '') +
           `</div>`;
  }

  const playOrTag = g.feature
    ? `<span class="play"><span class="tri"></span> あそぶ</span>`
    : '';

  const bannerImg = `<img class="banner" src="${g.banner}" alt="${g.name}" draggable="false">`;
  const ribbon = g.ribbon ? `<span class="ribbon">${g.ribbon}</span>` : '';

  if(g.feature){
    // body 左（看板は本文の先頭にブロック配置＝見切れない） / art 右（ribbon は右上）
    card.innerHTML =
      `<div class="body">
         ${bannerImg}
         <div class="desc">${g.desc}</div>
         ${meta}
         ${playOrTag}
       </div>` +
      `<div class="art">
         <img class="scene" src="${g.scene}" alt="" draggable="false">
         ${ribbon}
       </div>`;
  } else {
    // art 上 / body 下（看板は本文先頭にブロック配置＝アート下端に重ねつつ見切れない）
    card.innerHTML =
      `<div class="art">
         <img class="scene" src="${g.scene}" alt="" draggable="false">
       </div>` +
      `<div class="body">
         ${bannerImg}
         <div class="desc">${g.desc}</div>
         ${meta}
       </div>`;
  }

  card.addEventListener('click', (ev)=>navTo(g.href, g, ev));
  return card;
}

const featWrap = document.getElementById('grid-feature');
const grid = document.getElementById('grid');
GAMES.forEach((g,i)=>{
  const c = makeCard(g,i);
  (g.feature ? featWrap : grid).appendChild(c);
});

/* ===== せってい / ぜんぶ けす ===== */
const ovlSet = document.getElementById('ovlSet');
const ovl = document.getElementById('ovl');
function sfx(n){ try{ if(window.Sfx&&Sfx[n]) Sfx[n](); }catch(e){} }

document.getElementById('btnSettings').addEventListener('click', ()=>{ sfx('tap'); ovlSet.hidden = false; });
document.getElementById('setClose').addEventListener('click', ()=>{ sfx('tap'); ovlSet.hidden = true; });
document.getElementById('setReset').addEventListener('click', ()=>{ sfx('tap'); ovlSet.hidden = true; ovl.hidden = false; });
ovlSet.addEventListener('click', e=>{ if(e.target===ovlSet) ovlSet.hidden = true; });

function doReset(){
  try{ localStorage.removeItem('kuma_prog_save_v1'); }catch(e){}
  try{ if(window.Save&&Save.resetAll) Save.resetAll(['manekko','kimari','katachi','pitagora']); }catch(e){}
  ['manekko','kimari','katachi','pitagora'].forEach(ns=>{ try{ localStorage.removeItem('save_'+ns); }catch(e){} });
  sfx('whoosh');
  setTimeout(()=>location.reload(), 200);
}
document.getElementById('ovlNo').addEventListener('click', ()=>{ sfx('tap'); ovl.hidden = true; });
document.getElementById('ovlYes').addEventListener('click', doReset);
ovl.addEventListener('click', e=>{ if(e.target===ovl) ovl.hidden = true; });
