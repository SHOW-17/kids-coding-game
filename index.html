<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>あそびのもり</title>
<meta name="description" content="あそびながら かしこくなる。よめなくても あそべる ちいさな こどもの ゲームランド。">
<meta name="theme-color" content="#ffb43d">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="あそびのもり">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/arcade.css">
<style>
  /* ===== アーケード・トップ専用スタイル ===== */
  body{display:flex; flex-direction:column; align-items:center;
       padding:0 16px calc(28px + env(safe-area-inset-bottom));}

  /* 背景の浮遊オブジェ */
  .sky{position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none;}
  .sky .blob{position:absolute; border-radius:50%; filter:blur(6px); opacity:.5;}
  .sky .float{position:absolute; font-size:34px; opacity:.7; animation:drift linear infinite;}
  @keyframes drift{
    0%{transform:translateY(0) rotate(0);}
    50%{transform:translateY(-26px) rotate(10deg);}
    100%{transform:translateY(0) rotate(0);}
  }

  /* ヒーロー（ロゴ） */
  .hero{width:100%; max-width:600px; text-align:center; margin-top:calc(20px + env(safe-area-inset-top));}
  .logo{
    font-family:'Mochiy Pop One',sans-serif;
    font-size:clamp(34px,11vw,58px); line-height:1.05; color:var(--ink);
    text-shadow:3px 4px 0 #fff, 6px 9px 0 rgba(138,90,60,.16);
    letter-spacing:1px; margin:6px 0 2px;
  }
  .logo .em{display:inline-block; animation:bob 2.8s var(--ease) infinite;}
  .logo .em.r{animation-delay:.5s;}
  .tagline{font-size:clamp(13px,3.6vw,16px); color:var(--ink-soft); font-weight:800;
    margin-bottom:6px;}
  .tagline .chip{background:#fff; padding:3px 12px; border-radius:999px; box-shadow:var(--sh-1);
    display:inline-block; margin-top:6px;}

  /* ゲーム一覧 */
  .shelf{width:100%; max-width:600px; margin-top:14px;}
  .shelf h3{font-family:'Mochiy Pop One'; font-size:16px; color:var(--ink-soft);
    margin:18px 6px 10px; display:flex; align-items:center; gap:8px;}
  .shelf h3::before{content:''; flex:0 0 22px; height:4px; border-radius:9px; background:var(--honey);}

  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
  @media(max-width:380px){ .grid{gap:11px;} }

  /* ゲームカード */
  .game{
    position:relative; border-radius:var(--r-lg); overflow:hidden;
    background:var(--paper); box-shadow:var(--sh-2);
    text-align:left; padding:0; display:flex; flex-direction:column;
    transition:transform .14s var(--spring), box-shadow .14s var(--ease);
    border:3px solid #fff;
  }
  .game:active{transform:translateY(4px) scale(.985); box-shadow:var(--sh-1);}
  .game.feature{grid-column:1 / -1; flex-direction:row; align-items:stretch;}

  /* カード上部のアート面 */
  .art{
    position:relative; aspect-ratio:16/10; width:100%;
    display:flex; align-items:center; justify-content:center;
    background:var(--g1); overflow:hidden;
  }
  .feature .art{aspect-ratio:auto; width:44%; min-width:140px; flex:0 0 44%;}
  .art::after{content:''; position:absolute; inset:0;
    background:radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.35), transparent 60%);}

  /* カード下部のラベル */
  .label{padding:11px 13px 13px; display:flex; flex-direction:column; gap:5px; flex:1;}
  .label .name{font-family:'Mochiy Pop One'; font-size:clamp(16px,4.6vw,20px); color:var(--ink);
    line-height:1.15;}
  .label .desc{font-size:12.5px; color:var(--ink-soft); font-weight:700; line-height:1.45;}
  .feature .label{justify-content:center; padding:18px 18px 18px 4px;}
  .feature .label .name{font-size:clamp(20px,5.5vw,26px);}
  .feature .label .desc{font-size:13.5px;}

  .meta{display:flex; align-items:center; gap:8px; margin-top:3px;}
  .progress{flex:1; height:9px; border-radius:9px; background:#f0e3c8; overflow:hidden;}
  .progress > i{display:block; height:100%; width:0; border-radius:9px;
    background:linear-gradient(90deg,var(--honey-l),var(--honey)); transition:width .6s var(--spring);}
  .pct{font-size:12px; font-weight:800; color:var(--ink-faint); min-width:34px; text-align:right;}
  .playchip{align-self:flex-start; margin-top:6px;
    background:var(--ac,#ff8fab); color:#fff; font-family:'Mochiy Pop One';
    font-size:14px; padding:6px 16px; border-radius:999px; display:inline-flex; gap:6px; align-items:center;
    box-shadow:0 4px 0 rgba(0,0,0,.12);}

  /* リボン（しんさく！等） */
  .ribbon{position:absolute; top:10px; left:-2px; z-index:3;
    background:var(--c-red); color:#fff; font-family:'Mochiy Pop One'; font-size:12px;
    padding:4px 12px 4px 10px; border-radius:0 999px 999px 0;
    box-shadow:0 4px 8px rgba(224,72,72,.4);}

  /* ===== カード別 CSS アート（画像が来たら差し替え可） ===== */
  .art .emoji-big{font-size:clamp(48px,16vw,80px); filter:drop-shadow(0 6px 6px rgba(0,0,0,.12));
    position:relative; z-index:2;}
  .art .emoji-sub{position:absolute; font-size:clamp(26px,8vw,40px); z-index:2;}

  /* くまプロ：ミニ盤面 */
  .mini-board{position:relative; z-index:2; display:grid; grid-template-columns:repeat(3,1fr);
    gap:5px; width:74%; aspect-ratio:1; padding:0;}
  .mini-board .c{background:rgba(255,255,255,.4); border-radius:7px;}

  /* まねっこ：4色パッド */
  .simon-mini{position:relative; z-index:2; width:64%; aspect-ratio:1; border-radius:50%;
    display:grid; grid-template-columns:1fr 1fr; gap:6px; transform:rotate(0deg);}
  .simon-mini > i{display:block;}
  .simon-mini > i:nth-child(1){background:#5fcf80; border-radius:100% 0 0 0;}
  .simon-mini > i:nth-child(2){background:#ff6b6b; border-radius:0 100% 0 0;}
  .simon-mini > i:nth-child(3){background:#ffd23f; border-radius:0 0 0 100%;}
  .simon-mini > i:nth-child(4){background:#5cc8e8; border-radius:0 0 100% 0;}

  /* きまり：並ぶ玉 */
  .row-mini{position:relative; z-index:2; display:flex; gap:8px; align-items:center;}
  .row-mini > i{width:clamp(16px,5vw,26px); aspect-ratio:1; border-radius:50%; box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .row-mini .q{background:#fff; color:var(--c-blue-d); display:flex; align-items:center;
    justify-content:center; font-family:'Mochiy Pop One'; font-size:18px; box-shadow:0 3px 0 rgba(0,0,0,.1);}

  /* かたち：タングラム */
  .tan-mini{position:relative; z-index:2; width:62%; aspect-ratio:1;}
  .tan-mini i{position:absolute;}
  .tan-mini .t1{width:0;height:0;border-left:34px solid transparent;border-right:34px solid transparent;
    border-bottom:50px solid #ff9f43; top:6%; left:14%;}
  .tan-mini .t2{width:38px;height:38px;background:#b58cff; transform:rotate(45deg); bottom:8%; right:14%;}
  .tan-mini .t3{width:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;
    border-top:38px solid #6ad08a; bottom:6%; left:10%;}

  /* ぴたごら：玉と坂 */
  .pita-mini{position:relative; z-index:2; width:72%; height:64%;}
  .pita-mini .ramp{position:absolute; width:70%; height:10px; border-radius:6px; background:#fff;
    top:30%; left:0; transform:rotate(18deg); box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .pita-mini .ramp.b{top:62%; left:28%; transform:rotate(-16deg);}
  .pita-mini .ball{position:absolute; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#ff6b6b); top:8%; left:6%;
    box-shadow:0 3px 6px rgba(0,0,0,.2); animation:rolldemo 2.6s var(--ease) infinite;}
  .pita-mini .goal{position:absolute; bottom:0; right:6%; font-size:30px;}
  @keyframes rolldemo{0%{top:8%;left:6%;}45%{top:42%;left:48%;}100%{top:74%;left:74%;opacity:.4;}}

  /* フッター */
  .foot{width:100%; max-width:600px; margin-top:26px; display:flex; justify-content:center;}
  .reset-all{background:transparent; color:var(--ink-faint); font-weight:800; font-size:13px;
    padding:10px 18px; border-radius:999px;}
  .reset-all:active{background:rgba(0,0,0,.04);}
  .credit{width:100%; text-align:center; font-size:11px; color:var(--ink-faint);
    margin-top:6px; opacity:.8;}
</style>
</head>
<body>

<div class="sky" aria-hidden="true">
  <div class="blob" style="width:220px;height:220px;background:#ffe39a;top:-40px;left:-50px;"></div>
  <div class="blob" style="width:180px;height:180px;background:#ffd0dd;top:30%;right:-40px;"></div>
  <div class="blob" style="width:200px;height:200px;background:#c8eaff;bottom:-30px;left:10%;"></div>
  <div class="float" style="left:8%;top:18%;animation-duration:7s;">🍃</div>
  <div class="float" style="left:84%;top:12%;animation-duration:9s;animation-delay:1s;">☁️</div>
  <div class="float" style="left:70%;top:40%;animation-duration:8s;animation-delay:.5s;">🦋</div>
  <div class="float" style="left:16%;top:64%;animation-duration:10s;animation-delay:2s;">🍄</div>
  <div class="float" style="left:90%;top:70%;animation-duration:7.5s;animation-delay:1.5s;">🌸</div>
</div>

<header class="hero enter">
  <div class="logo"><span class="em">🐻</span> あそびの<wbr>もり <span class="em r">🍯</span></div>
  <div class="tagline">あそびながら かしこくなる！<br>
    <span class="chip">よめなくても だいじょうぶ 👍</span></div>
</header>

<main class="shelf">
  <h3 class="enter d1">あそびを えらんでね</h3>
  <div class="grid" id="grid"></div>

  <div class="foot enter d5">
    <button class="reset-all" id="resetAll">🔄 きろくを ぜんぶ けす</button>
  </div>
  <div class="credit">あそびのもり ・ こどもの ちいさな ゲームランド</div>
</main>

<script src="assets/audio.js"></script>
<script src="assets/fx.js"></script>
<script src="assets/save.js"></script>
<script src="assets/shell.js"></script>
<script>
/* ===== ゲーム定義 ===== */
const GAMES = [
  {
    id:'kuma', feature:true, href:'kuma-programming.html',
    name:'くまさん プログラミング', desc:'やじるしを ならべて ゴールへ。じゅんばんに めいれいする あそび。',
    g1:'#ffe7bd', g2:'#ffd98a', ac:'#f59312', total:19,
    art:`<div class="mini-board">
           <i class="c"></i><i class="c"></i><i class="c"></i>
           <i class="c"></i><i class="c"></i><i class="c"></i>
           <i class="c"></i><i class="c"></i><i class="c"></i>
         </div>
         <div class="emoji-sub" style="left:14%;top:14%;font-size:clamp(28px,9vw,44px);">🐻</div>
         <div class="emoji-sub" style="right:14%;bottom:12%;">🍯</div>`
  },
  {
    id:'manekko', href:'games/manekko.html', ribbon:'しんさく！',
    name:'まねっこ', desc:'ひかった じゅんばんを おぼえて まねっこ。',
    g1:'#e7d8ff', g2:'#cdb0ff', ac:'#9165e0', ns:'manekko',
    progressKey:'best', progressLabel:v=>v>0?('さいこう '+v+'だん'):null,
    art:`<div class="simon-mini anim-float"><i></i><i></i><i></i><i></i></div>`
  },
  {
    id:'kimari', href:'games/kimari.html', ribbon:'しんさく！',
    name:'きまり あそび', desc:'ならびの つぎは なに？ きまりを みつけよう。',
    g1:'#cfeeff', g2:'#a9ddf7', ac:'#2fa6cc', ns:'kimari',
    progressKey:'cleared', progressLabel:v=>v>0?(v+'もん せいかい'):null,
    art:`<div class="row-mini">
           <i style="background:#ff6b6b"></i><i style="background:#5cc8e8"></i>
           <i style="background:#ff6b6b"></i><i class="q">?</i>
         </div>`
  },
  {
    id:'katachi', href:'games/katachi.html', ribbon:'しんさく！',
    name:'かたち づくり', desc:'ピースを ならべて おてほんの かたちを つくろう。',
    g1:'#d9f5e1', g2:'#b6ebc6', ac:'#46b56a', ns:'katachi',
    progressKey:'cleared', progressLabel:v=>v>0?(v+'こ かんせい'):null,
    art:`<div class="tan-mini anim-float"><i class="t1"></i><i class="t2"></i><i class="t3"></i></div>`
  },
  {
    id:'pitagora', href:'games/pitagora.html', ribbon:'しんさく！',
    name:'ぴたごら', desc:'どうぐを おいて たまを ゴールへ ころがそう。',
    g1:'#ffe2c2', g2:'#ffc98e', ac:'#e57e1c', ns:'pitagora',
    progressKey:'cleared', progressLabel:v=>v>0?(v+'こ クリア'):null,
    art:`<div class="pita-mini"><i class="ramp"></i><i class="ramp b"></i>
           <i class="ball"></i><span class="goal">🍯</span></div>`
  }
];

/* くまゲームの進捗（独自キー）を読む */
function kumaCleared(){
  try{
    const d = JSON.parse(localStorage.getItem('kuma_prog_save_v1'));
    return d && d.cleared ? d.cleared.length : 0;
  }catch(e){ return 0; }
}

/* カード生成 */
const grid = document.getElementById('grid');
GAMES.forEach((g,i)=>{
  const card = App.el('button', 'game enter d'+Math.min(i+2,6) + (g.feature?' feature':''));
  card.style.setProperty('--g1', g.g1);
  card.style.setProperty('--ac', g.ac);
  const art = `<div class="art" style="background:linear-gradient(160deg,${g.g1},${g.g2});">${g.art}</div>`;

  // 進捗
  let metaHtml='';
  if(g.total){
    const done = (g.id==='kuma') ? kumaCleared() : 0;
    const pct = Math.round(done/g.total*100);
    metaHtml = `<div class="meta">
        <div class="progress"><i style="width:${pct}%"></i></div>
        <span class="pct">${done}/${g.total}</span></div>`;
  } else if(g.ns){
    let v=0; try{ v = Save.game(g.ns).get(g.progressKey,0); }catch(e){}
    const label = g.progressLabel ? g.progressLabel(v) : null;
    if(label) metaHtml = `<div class="meta"><span class="pct" style="min-width:auto;color:var(--ink-soft)">⭐ ${label}</span></div>`;
  }

  card.innerHTML =
    (g.ribbon?`<span class="ribbon">${g.ribbon}</span>`:'') +
    art +
    `<div class="label">
       <div class="name">${g.name}</div>
       <div class="desc">${g.desc}</div>
       ${metaHtml}
       <span class="playchip">あそぶ ▶</span>
     </div>`;

  card.addEventListener('click', ()=>{
    try{ Sfx.pop(); }catch(e){}
    const r = card.getBoundingClientRect();
    try{ FX.ring(r.left+r.width/2, r.top+r.height/2, {color:g.ac, vr:7, life:24}); }catch(e){}
    App.go(g.href);
  });
  grid.appendChild(card);
});

/* ぜんぶ けす */
document.getElementById('resetAll').addEventListener('click', ()=>{
  App.showModal({
    emoji:'🧹', title:'ぜんぶ けす？',
    text:'あそんだ きろくが ぜんぶ きえます。<br>ほんとうに けして いい？',
    buttons:[
      {label:'やめる', cls:'btn--ghost'},
      {label:'けす', cls:'', onClick:()=>{
        try{ localStorage.removeItem('kuma_prog_save_v1'); }catch(e){}
        try{ Save.resetAll(['manekko','kimari','katachi','pitagora']); }catch(e){}
        try{ Sfx.whoosh(); }catch(e){}
        setTimeout(()=>location.reload(), 200);
      }}
    ]
  });
});
</script>
</body>
</html>
