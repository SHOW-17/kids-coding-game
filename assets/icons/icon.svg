<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe7b0"/>
      <stop offset="1" stop-color="#ffb43d"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd1f3"/>
      <stop offset="1" stop-color="#41a9e6"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe8f6"/>
    </linearGradient>
  </defs>

  <!-- background badge -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="372" r="158" fill="#ffffff" opacity="0.22"/>

  <!-- mane (back) -->
  <path d="M150 250 q-44 14 -36 78 q34 -20 52 -14 q-26 26 -10 64 q34 -28 56 -22 Z" fill="#2f8fd0"/>
  <path d="M362 250 q44 14 36 78 q-34 -20 -52 -14 q26 26 10 64 q-34 -28 -56 -22 Z" fill="#2f8fd0"/>

  <!-- ears -->
  <path d="M176 196 l30 -54 l34 48 Z" fill="url(#body)"/>
  <path d="M336 196 l-30 -54 l-34 48 Z" fill="url(#body)"/>

  <!-- horn -->
  <path d="M256 92 l26 86 h-52 Z" fill="url(#horn)" stroke="#bcd9ea" stroke-width="5"/>
  <path d="M243 150 l26 0 M238 122 l34 0 M249 96 l14 0" stroke="#9cc6df" stroke-width="6" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="256" cy="288" rx="148" ry="138" fill="url(#body)"/>

  <!-- muzzle -->
  <ellipse cx="256" cy="332" rx="92" ry="74" fill="#eaf6fd"/>

  <!-- eyes -->
  <ellipse cx="198" cy="282" rx="20" ry="24" fill="#243a47"/>
  <ellipse cx="314" cy="282" rx="20" ry="24" fill="#243a47"/>
  <circle cx="205" cy="274" r="6" fill="#fff"/>
  <circle cx="321" cy="274" r="6" fill="#fff"/>

  <!-- nose + smile -->
  <ellipse cx="256" cy="322" rx="15" ry="10" fill="#7fb6d6"/>
  <path d="M218 348 q38 34 76 0" stroke="#3f7ea0" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- cheeks -->
  <circle cx="168" cy="328" r="22" fill="#ff9bb0" opacity="0.7"/>
  <circle cx="344" cy="328" r="22" fill="#ff9bb0" opacity="0.7"/>
</svg>
